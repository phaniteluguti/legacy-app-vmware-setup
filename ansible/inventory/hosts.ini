# =============================================================================
# Ansible inventory — fill IPs after Terraform apply, or let Terraform generate
# =============================================================================
[java_servers]
# 192.168.1.101 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[dotnet_servers]
# 192.168.1.102 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[php_servers]
# 192.168.1.103 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[legacy_apps:children]
java_servers
dotnet_servers
php_servers
