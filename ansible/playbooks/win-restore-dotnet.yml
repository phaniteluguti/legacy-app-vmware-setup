---
# =============================================================================
# Restore .NET Framework on Windows VMs after accidental removal.
# Uses cmd.exe shell (not PowerShell) since PowerShell is broken.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/win-restore-dotnet.yml
# =============================================================================

- name: Restore .NET Framework on Windows VMs
  hosts: win_servers:win_servers_3tier
  gather_facts: false
  become: false
  vars:
    ansible_shell_type: cmd
    ansible_become: false

  tasks:
    # First check the actual state and attempt repair
    - name: Check NetFx4 state and force repair
      raw: >-
        dism /online /get-featureinfo /featurename:NetFx4
        & echo === CLEANUP ===
        & dism /online /cleanup-image /restorehealth
        & echo === SFC ===
        & sfc /scannow
        & echo === RE-ENABLE ===
        & dism /online /disable-feature /featurename:NetFx4 /Remove /norestart
        & dism /online /enable-feature /featurename:NetFx4 /all /norestart
        & echo === REBOOT ===
        & shutdown /r /t 30 /f /c "Restoring .NET Framework"
      failed_when: false
      changed_when: true
