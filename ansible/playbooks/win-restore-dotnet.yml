---
# =============================================================================
# Restore .NET Framework on Windows VMs after accidental removal.
# Uses cmd.exe shell (not PowerShell) since PowerShell is broken.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/win-restore-dotnet.yml
# =============================================================================

- name: Restore .NET Framework on Windows VMs
  hosts: win_servers:win_servers_3tier
  gather_facts: false
  become: false
  vars:
    ansible_shell_type: cmd
    ansible_become: false

  tasks:
    # Single raw command to avoid broken WinRM sessions between tasks.
    # Disables NetFx4 first (clears corrupt state), then re-enables it,
    # then reboots. All chained so only one WinRM call is needed.
    - name: Disable, re-enable .NET Framework 4.x and reboot
      raw: >-
        dism /online /disable-feature /featurename:NetFx4 /norestart
        & dism /online /enable-feature /featurename:NetFx4 /all /norestart
        & dism /online /enable-feature /featurename:NetFx3 /all /norestart /limitaccess
        & shutdown /r /t 30 /f /c "Restoring .NET Framework - rebooting"
      failed_when: false
      changed_when: true
