---
# =============================================================================
# Domain Join — Windows VMs
# Joins all Windows VMs to an Active Directory domain.
# DNS registration happens automatically when a machine joins the domain.
#
# Delegates the Add-Computer call to each Windows VM directly.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/domain-join-windows.yml \
#     -e "ad_domain=azurecmf.org" \
#     -e "ad_admin_user=Administrator" -e "ad_admin_password=SECRET" \
#     -e "dns_server=10.20.1.4" -v
# =============================================================================
- name: Join Windows VMs to Active Directory Domain
  hosts: win_servers:win_servers_3tier
  gather_facts: true
  become: false
  serial: 3

  tasks:
    - name: Validate required variables
      assert:
        that:
          - ad_domain is defined and ad_domain | length > 0
          - ad_admin_user is defined and ad_admin_user | length > 0
          - ad_admin_password is defined and ad_admin_password | length > 0
          - dns_server is defined and dns_server | length > 0
        fail_msg: "ad_domain, ad_admin_user, ad_admin_password, and dns_server must be provided"

    - name: Check current domain membership
      win_shell: |
        (Get-WmiObject -Class Win32_ComputerSystem).Domain
      register: current_domain
      changed_when: false

    - name: Show current domain status
      debug:
        msg: "{{ ansible_hostname }} is currently in: {{ current_domain.stdout | trim }}"

    - name: Skip if already domain-joined
      set_fact:
        already_joined: "{{ (current_domain.stdout | trim | lower) == (ad_domain | lower) }}"

    - name: Set DNS to point to domain controller
      win_shell: |
        $adapter = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' } | Select-Object -First 1
        Set-DnsClientServerAddress -InterfaceIndex $adapter.ifIndex -ServerAddresses "{{ dns_server }}"
        Write-Host "DNS set to {{ dns_server }} on adapter $($adapter.Name)"
      when: not already_joined | bool

    - name: Join the Active Directory domain
      win_shell: |
        $secpasswd = ConvertTo-SecureString "{{ ad_admin_password }}" -AsPlainText -Force
        $cred = New-Object System.Management.Automation.PSCredential ("{{ ad_admin_user }}@{{ ad_domain }}", $secpasswd)
        Add-Computer -DomainName "{{ ad_domain }}" -Credential $cred -Force -ErrorAction Stop
        Write-Host "Successfully joined {{ ad_domain }}"
      register: join_result
      when: not already_joined | bool
      no_log: true

    - name: Reboot to complete domain join
      win_reboot:
        reboot_timeout: 300
        msg: "Rebooting to complete domain join"
      when:
        - not already_joined | bool
        - join_result is changed

    - name: Wait for VM to come back online
      wait_for_connection:
        delay: 15
        timeout: 300
      when:
        - not already_joined | bool
        - join_result is changed

    - name: Verify domain membership after reboot
      win_shell: |
        (Get-WmiObject -Class Win32_ComputerSystem).Domain
      register: verify_domain
      changed_when: false

    - name: Show final status
      debug:
        msg: >-
          {{ ansible_hostname }}:
          {{ 'Already joined to ' + ad_domain if already_joined | bool
             else 'Joined to ' + (verify_domain.stdout | trim)
                  if (verify_domain.stdout | default('') | trim | lower) == (ad_domain | lower)
             else 'FAILED - current domain: ' + (verify_domain.stdout | default('unknown') | trim) }}
