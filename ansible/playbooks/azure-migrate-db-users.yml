---
# =============================================================================
# Azure Migrate — Create least-privilege database users for discovery
#
# Creates dedicated 'azmigrateuser' accounts on PostgreSQL and MySQL
# with the minimum permissions Azure Migrate needs for deep discovery.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/azure-migrate-db-users.yml \
#     -e "az_migrate_user=azmigrateuser" \
#     -e "az_migrate_password=<PASSWORD>" \
#     -e "appliance_ip=10.20.1.x"
# =============================================================================

# ─── Play 1: PostgreSQL — Linux VMs (1-tier java_servers + 3-tier java_database)
- name: Create Azure Migrate user on PostgreSQL (Linux)
  hosts: java_servers:java_database
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Validate required variables
      assert:
        that:
          - az_migrate_user is defined and az_migrate_user | length > 0
          - az_migrate_password is defined and az_migrate_password | length > 0
          - appliance_ip is defined and appliance_ip | length > 0
        fail_msg: "Required: -e az_migrate_user=... -e az_migrate_password=... -e appliance_ip=..."

    - name: Create Azure Migrate PostgreSQL user with least privileges
      no_log: true
      shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ az_migrate_user }}'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE USER {{ az_migrate_user }} WITH PASSWORD '{{ az_migrate_password }}' LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION;"
        sudo -u postgres psql -c "ALTER USER {{ az_migrate_user }} WITH PASSWORD '{{ az_migrate_password }}';"
        # Grant CONNECT, USAGE on schemas, SELECT on tables — for every non-template database
        for db in $(sudo -u postgres psql -tAc "SELECT datname FROM pg_database WHERE datistemplate = false;"); do
          sudo -u postgres psql -c "GRANT CONNECT ON DATABASE \"$db\" TO {{ az_migrate_user }};"
          sudo -u postgres psql -d "$db" -c "GRANT USAGE ON ALL SCHEMAS IN DATABASE \"$db\" TO {{ az_migrate_user }};" 2>/dev/null || \
          sudo -u postgres psql -d "$db" -c "DO \$\$DECLARE s record; BEGIN FOR s IN SELECT schema_name FROM information_schema.schemata WHERE schema_name NOT LIKE 'pg_%' AND schema_name <> 'information_schema' LOOP EXECUTE format('GRANT USAGE ON SCHEMA %I TO {{ az_migrate_user }}', s.schema_name); EXECUTE format('GRANT SELECT ON ALL TABLES IN SCHEMA %I TO {{ az_migrate_user }}', s.schema_name); END LOOP; END\$\$;"
        done
        # Grant monitoring roles required by Azure Migrate
        sudo -u postgres psql -c "GRANT pg_read_all_settings TO {{ az_migrate_user }};"
        sudo -u postgres psql -c "GRANT pg_read_all_stats TO {{ az_migrate_user }};"
        sudo -u postgres psql -c "GRANT pg_monitor TO {{ az_migrate_user }};"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure PostgreSQL listens on all interfaces (not just localhost)
      lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
        regexp: '^#?\s*listen_addresses\s*='
        line: "listen_addresses = '*'"
      notify: Reload PostgreSQL

    - name: Allow Azure Migrate appliance in pg_hba.conf
      lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        regexp: "host\\s+all\\s+{{ az_migrate_user }}\\s+{{ appliance_ip }}"
        insertafter: '^# IPv4 local connections'
        line: "host    all   {{ az_migrate_user }}   {{ appliance_ip }}/32   scram-sha-256"
      notify: Reload PostgreSQL

    # ── Validation: PostgreSQL (Linux) ──
    - name: Flush handlers before validation
      meta: flush_handlers

    - name: Check runtime listen_addresses and force restart if needed
      shell: |
        current=$(sudo -u postgres psql -tAc "SHOW listen_addresses;" | tr -d ' ')
        if [ "$current" != "*" ]; then
          echo "listen_addresses is '$current', restarting PostgreSQL to apply '*'..."
          systemctl restart postgresql
          echo "RESTARTED"
        else
          echo "listen_addresses is already '*', no restart needed."
        fi
      args:
        executable: /bin/bash
      register: pg_force_restart
      changed_when: "'RESTARTED' in pg_force_restart.stdout"

    - name: "[VALIDATE] Check PostgreSQL user exists and can login"
      shell: |
        sudo -u postgres psql -tAc "SELECT rolname, rolcanlogin FROM pg_roles WHERE rolname='{{ az_migrate_user }}'"
      register: pg_user_check
      changed_when: false

    - name: "[VALIDATE] Check PostgreSQL user roles"
      shell: |
        sudo -u postgres psql -tAc "
          SELECT r.rolname
          FROM pg_auth_members m
          JOIN pg_roles r ON m.roleid = r.oid
          WHERE m.member = (SELECT oid FROM pg_roles WHERE rolname = '{{ az_migrate_user }}');"
      register: pg_roles_check
      changed_when: false

    - name: "[VALIDATE] Check listen_addresses setting"
      shell: |
        sudo -u postgres psql -tAc "SHOW listen_addresses;"
      register: pg_listen_check
      changed_when: false

    - name: "[VALIDATE] Check PostgreSQL is listening on port 5432 (all interfaces)"
      shell: |
        ss -tlnp | grep ':5432' || netstat -tlnp 2>/dev/null | grep ':5432'
      register: pg_port_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Check pg_hba.conf has appliance entry"
      shell: |
        grep '{{ az_migrate_user }}' /etc/postgresql/{{ postgres_version }}/main/pg_hba.conf
      register: pg_hba_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Test password authentication for Azure Migrate user"
      no_log: true
      shell: |
        PGPASSWORD='{{ az_migrate_password }}' psql -h 127.0.0.1 -U {{ az_migrate_user }} -d postgres -tAc "SELECT 1;" 2>&1
      register: pg_auth_test
      changed_when: false
      ignore_errors: true

    - name: "[RESULT] PostgreSQL validation summary"
      debug:
        msg:
          - "──────────────────────────────────────────"
          - "HOST: {{ inventory_hostname }}"
          - "User exists: {{ 'YES (' + pg_user_check.stdout.strip() + ')' if pg_user_check.stdout.strip() else 'NO ✗' }}"
          - "Roles: {{ pg_roles_check.stdout_lines | default([]) }}"
          - "listen_addresses: {{ pg_listen_check.stdout.strip() | default('UNKNOWN') }}"
          - "Port 5432 binding: {{ pg_port_check.stdout_lines | default(['NOT FOUND']) }}"
          - "pg_hba.conf entry: {{ 'YES' if pg_hba_check.rc == 0 else 'MISSING ✗' }}"
          - "Password auth test: {{ 'PASS ✓' if pg_auth_test.rc == 0 else 'FAIL ✗ — ' + pg_auth_test.stdout.strip() }}"
          - "──────────────────────────────────────────"

    - name: "[FAIL] PostgreSQL user does not exist"
      fail:
        msg: "Azure Migrate PostgreSQL user '{{ az_migrate_user }}' was NOT created on {{ inventory_hostname }}"
      when: pg_user_check.stdout.strip() == ""

  handlers:
    - name: Reload PostgreSQL
      systemd:
        name: postgresql
        state: restarted

# ─── Play 2: PostgreSQL — Windows VMs (1-tier win_java_servers + 3-tier win_java_database)
- name: Create Azure Migrate user on PostgreSQL (Windows)
  hosts: win_java_servers:win_java_database
  gather_facts: false
  become: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Validate required variables
      assert:
        that:
          - az_migrate_user is defined and az_migrate_user | length > 0
          - az_migrate_password is defined and az_migrate_password | length > 0
          - appliance_ip is defined and appliance_ip | length > 0
        fail_msg: "Required: -e az_migrate_user=... -e az_migrate_password=... -e appliance_ip=..."

    - name: Create Azure Migrate PostgreSQL user with least privileges (Windows)
      no_log: true
      win_shell: |
        $env:PGPASSWORD = "{{ postgres_password }}"
        $psql = "C:\Program Files\PostgreSQL\{{ postgres_version }}\bin\psql.exe"

        # Create user if not exists
        $exists = & $psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ az_migrate_user }}'"
        if ($exists -ne '1') {
          & $psql -U postgres -c "CREATE USER {{ az_migrate_user }} WITH PASSWORD '{{ az_migrate_password }}' LOGIN NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION;"
        }
        & $psql -U postgres -c "ALTER USER {{ az_migrate_user }} WITH PASSWORD '{{ az_migrate_password }}';"

        # Grant CONNECT, USAGE, SELECT on all non-template databases
        $dbs = & $psql -U postgres -tAc "SELECT datname FROM pg_database WHERE datistemplate = false;"
        foreach ($db in $dbs) {
          $db = $db.Trim()
          if ($db) {
            & $psql -U postgres -c "GRANT CONNECT ON DATABASE `"$db`" TO {{ az_migrate_user }};"
            & $psql -U postgres -d $db -c "DO `$`$DECLARE s record; BEGIN FOR s IN SELECT schema_name FROM information_schema.schemata WHERE schema_name NOT LIKE 'pg_%' AND schema_name <> 'information_schema' LOOP EXECUTE format('GRANT USAGE ON SCHEMA %I TO {{ az_migrate_user }}', s.schema_name); EXECUTE format('GRANT SELECT ON ALL TABLES IN SCHEMA %I TO {{ az_migrate_user }}', s.schema_name); END LOOP; END`$`$;"
          }
        }

        # Grant monitoring roles
        & $psql -U postgres -c "GRANT pg_read_all_settings TO {{ az_migrate_user }};"
        & $psql -U postgres -c "GRANT pg_read_all_stats TO {{ az_migrate_user }};"
        & $psql -U postgres -c "GRANT pg_monitor TO {{ az_migrate_user }};"
      changed_when: false

    - name: Ensure PostgreSQL listens on all interfaces (Windows)
      win_lineinfile:
        path: 'C:\Program Files\PostgreSQL\{{ postgres_version }}\data\postgresql.conf'
        regexp: '^#?\s*listen_addresses\s*='
        line: "listen_addresses = '*'"
      notify: Reload PostgreSQL service (Windows)

    - name: Allow Azure Migrate appliance in pg_hba.conf (Windows)
      win_lineinfile:
        path: 'C:\Program Files\PostgreSQL\{{ postgres_version }}\data\pg_hba.conf'
        regexp: "host\\s+all\\s+{{ az_migrate_user }}\\s+{{ appliance_ip }}"
        line: "host    all   {{ az_migrate_user }}   {{ appliance_ip }}/32   scram-sha-256"
        insertafter: "^# IPv4 local connections"

    - name: Reload PostgreSQL service (Windows)
      no_log: true
      win_shell: |
        & "C:\Program Files\PostgreSQL\{{ postgres_version }}\bin\pg_ctl.exe" reload -D "C:\Program Files\PostgreSQL\{{ postgres_version }}\data"
      changed_when: false

    # ── Validation: PostgreSQL (Windows) ──
    - name: "[VALIDATE] Check PostgreSQL user exists and roles (Windows)"
      no_log: true
      win_shell: |
        $env:PGPASSWORD = "{{ postgres_password }}"
        $psql = "C:\Program Files\PostgreSQL\{{ postgres_version }}\bin\psql.exe"
        Write-Output "=== USER ==="
        & $psql -U postgres -tAc "SELECT rolname, rolcanlogin FROM pg_roles WHERE rolname='{{ az_migrate_user }}'"
        Write-Output "=== ROLES ==="
        & $psql -U postgres -tAc "SELECT r.rolname FROM pg_auth_members m JOIN pg_roles r ON m.roleid = r.oid WHERE m.member = (SELECT oid FROM pg_roles WHERE rolname = '{{ az_migrate_user }}')"
        Write-Output "=== LISTEN ==="
        & $psql -U postgres -tAc "SHOW listen_addresses;"
      register: win_pg_validate
      changed_when: false

    - name: "[VALIDATE] Check PostgreSQL port 5432 binding (Windows)"
      win_shell: |
        netstat -an | Select-String ':5432.*LISTEN'
      register: win_pg_port_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Check pg_hba.conf has appliance entry (Windows)"
      win_shell: |
        Select-String -Path 'C:\Program Files\PostgreSQL\{{ postgres_version }}\data\pg_hba.conf' -Pattern '{{ az_migrate_user }}'
      register: win_pg_hba_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Test password authentication (Windows)"
      no_log: true
      win_shell: |
        $env:PGPASSWORD = "{{ az_migrate_password }}"
        & "C:\Program Files\PostgreSQL\{{ postgres_version }}\bin\psql.exe" -h 127.0.0.1 -U {{ az_migrate_user }} -d postgres -tAc "SELECT 1;" 2>&1
      register: win_pg_auth_test
      changed_when: false
      ignore_errors: true

    - name: "[RESULT] PostgreSQL validation summary (Windows)"
      debug:
        msg:
          - "──────────────────────────────────────────"
          - "HOST: {{ inventory_hostname }}"
          - "Validation output: {{ win_pg_validate.stdout_lines | default([]) }}"
          - "Port 5432 binding: {{ win_pg_port_check.stdout_lines | default(['NOT FOUND']) }}"
          - "pg_hba.conf entry: {{ 'YES' if win_pg_hba_check.rc == 0 else 'MISSING ✗' }}"
          - "Password auth test: {{ 'PASS ✓' if win_pg_auth_test.rc == 0 else 'FAIL ✗' }}"
          - "──────────────────────────────────────────"

# ─── Play 3: MySQL — Linux VMs (1-tier php_servers + 3-tier php_database)
- name: Create Azure Migrate user on MySQL (Linux)
  hosts: php_servers:php_database
  become: true
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Validate required variables
      assert:
        that:
          - az_migrate_user is defined and az_migrate_user | length > 0
          - az_migrate_password is defined and az_migrate_password | length > 0
        fail_msg: "Required: -e az_migrate_user=... -e az_migrate_password=..."

    - name: Create Azure Migrate MySQL user with discovery privileges
      no_log: true
      shell: |
        mysql -u root -p'{{ mysql_root_password }}' -e "
          CREATE USER IF NOT EXISTS '{{ az_migrate_user }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ az_migrate_password }}';
          ALTER USER '{{ az_migrate_user }}'@'%' IDENTIFIED WITH mysql_native_password BY '{{ az_migrate_password }}';
          GRANT USAGE, PROCESS, REPLICATION CLIENT ON *.* TO '{{ az_migrate_user }}'@'%';
          GRANT SELECT ON *.* TO '{{ az_migrate_user }}'@'%';
          FLUSH PRIVILEGES;"
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: mysql_create_result

    - name: Show MySQL user creation error
      debug:
        msg: "MySQL error: {{ mysql_create_result.stderr }}"
      when: mysql_create_result.rc != 0

    - name: Fail if MySQL user creation failed
      fail:
        msg: "Failed to create Azure Migrate MySQL user. See error above."
      when: mysql_create_result.rc != 0

    - name: Set default_authentication_plugin to mysql_native_password
      shell: |
        conf="/etc/mysql/mysql.conf.d/mysqld.cnf"
        [ ! -f "$conf" ] && conf="/etc/mysql/my.cnf"
        [ ! -f "$conf" ] && conf="/etc/my.cnf"
        if grep -q 'default_authentication_plugin' "$conf" 2>/dev/null; then
          sed -i 's/^\s*default_authentication_plugin\s*=.*/default_authentication_plugin=mysql_native_password/' "$conf"
          echo "CHANGED: updated default_authentication_plugin in $conf"
        elif grep -q '\[mysqld\]' "$conf" 2>/dev/null; then
          sed -i '/\[mysqld\]/a default_authentication_plugin=mysql_native_password' "$conf"
          echo "CHANGED: added default_authentication_plugin to $conf"
        else
          echo "SKIP: no [mysqld] section found"
        fi
      args:
        executable: /bin/bash
      register: auth_plugin_result
      changed_when: "'CHANGED' in auth_plugin_result.stdout"
      notify: Restart MySQL

    - name: Ensure MySQL listens on all interfaces (not just localhost)
      shell: |
        # Try both common MySQL config paths
        for conf in /etc/mysql/mysql.conf.d/mysqld.cnf /etc/mysql/my.cnf /etc/my.cnf; do
          if [ -f "$conf" ] && grep -q 'bind-address' "$conf"; then
            sed -i 's/^\s*bind-address\s*=.*/bind-address = 0.0.0.0/' "$conf"
            echo "CHANGED: $conf"
          fi
        done
      args:
        executable: /bin/bash
      register: bind_result
      changed_when: "'CHANGED' in bind_result.stdout"
      notify: Restart MySQL

    # ── Validation: MySQL (Linux) ──
    - name: Flush handlers before validation
      meta: flush_handlers

    - name: "[VALIDATE] Check MySQL user exists and auth plugin"
      no_log: true
      shell: |
        mysql -u root -p'{{ mysql_root_password }}' -e "SELECT user, host, plugin FROM mysql.user WHERE user='{{ az_migrate_user }}';" 2>/dev/null
      register: mysql_user_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Check MySQL user grants"
      no_log: true
      shell: |
        mysql -u root -p'{{ mysql_root_password }}' -e "SHOW GRANTS FOR '{{ az_migrate_user }}'@'%';" 2>/dev/null
      register: mysql_grants_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Check MySQL bind-address configuration"
      shell: |
        for conf in /etc/mysql/mysql.conf.d/mysqld.cnf /etc/mysql/my.cnf /etc/my.cnf; do
          if [ -f "$conf" ]; then
            grep -H 'bind-address' "$conf" 2>/dev/null || true
          fi
        done
      args:
        executable: /bin/bash
      register: mysql_bind_check
      changed_when: false

    - name: "[VALIDATE] Check MySQL is listening on port 3306 (all interfaces)"
      shell: |
        ss -tlnp | grep ':3306' || netstat -tlnp 2>/dev/null | grep ':3306'
      register: mysql_port_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Test MySQL password authentication for Azure Migrate user"
      no_log: true
      shell: |
        mysql -h 127.0.0.1 -u '{{ az_migrate_user }}' -p'{{ az_migrate_password }}' -e "SELECT 1;" 2>&1
      register: mysql_auth_test
      changed_when: false
      ignore_errors: true

    - name: "[RESULT] MySQL validation summary"
      debug:
        msg:
          - "──────────────────────────────────────────"
          - "HOST: {{ inventory_hostname }}"
          - "User/plugin: {{ mysql_user_check.stdout_lines | default(['NOT FOUND ✗']) }}"
          - "Grants: {{ mysql_grants_check.stdout_lines | default(['NONE ✗']) }}"
          - "bind-address config: {{ mysql_bind_check.stdout_lines | default(['NOT FOUND']) }}"
          - "Port 3306 binding: {{ mysql_port_check.stdout_lines | default(['NOT FOUND ✗']) }}"
          - "Password auth test: {{ 'PASS ✓' if mysql_auth_test.rc == 0 else 'FAIL ✗ — ' + (mysql_auth_test.stdout | default(mysql_auth_test.stderr | default(''))) }}"
          - "──────────────────────────────────────────"

    - name: "[FAIL] MySQL user does not exist"
      fail:
        msg: "Azure Migrate MySQL user '{{ az_migrate_user }}' was NOT created on {{ inventory_hostname }}"
      when: mysql_user_check.rc != 0

  handlers:
    - name: Restart MySQL
      systemd:
        name: mysql
        state: restarted

# ─── Play 4: MySQL — Windows VMs (1-tier win_php_servers + 3-tier win_php_database)
- name: Create Azure Migrate user on MySQL (Windows)
  hosts: win_php_servers:win_php_database
  gather_facts: false
  become: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Validate required variables
      assert:
        that:
          - az_migrate_user is defined and az_migrate_user | length > 0
          - az_migrate_password is defined and az_migrate_password | length > 0
        fail_msg: "Required: -e az_migrate_user=... -e az_migrate_password=..."

    - name: "Enable mysql_native_password plugin in my.ini and restart MySQL (MySQL 8.4+)"
      win_shell: |
        $rootPwd = '{{ mysql_root_password }}'
        {% raw %}
        $mysqlBin = (Get-Command mysql -ErrorAction SilentlyContinue).Source
        if (!$mysqlBin) { $mysqlBin = "C:\tools\mysql\current\bin\mysql.exe" }

        # --- Step 1: Locate my.ini ---
        $dataDir = ""
        $baseDir = ""
        $testConn = & $mysqlBin -u root -p"$rootPwd" -N -e "SELECT 1;" 2>&1
        if ($LASTEXITCODE -eq 0) {
          $dataDir = (& $mysqlBin -u root -p"$rootPwd" -N -e "SELECT @@datadir;" 2>&1 | Where-Object { $_ -notmatch 'Warning' }).Trim()
          $baseDir = (& $mysqlBin -u root -p"$rootPwd" -N -e "SELECT @@basedir;" 2>&1 | Where-Object { $_ -notmatch 'Warning' }).Trim()
        }
        $candidates = @("C:\tools\mysql\current\my.ini", "C:\ProgramData\MySQL\MySQL Server 8.4\my.ini", "C:\ProgramData\MySQL\MySQL Server 8.0\my.ini")
        if ($dataDir) { $candidates = @("${dataDir}my.ini") + $candidates }
        if ($baseDir) { $candidates = @("${baseDir}my.ini") + $candidates }
        $candidates = $candidates | Select-Object -Unique
        $myIni = $null
        foreach ($p in $candidates) { if (Test-Path $p) { $myIni = $p; break } }

        # --- Step 2: Check if mysql_native_password plugin is already active ---
        $svc = Get-Service -Name 'MySQL' -ErrorAction SilentlyContinue
        if (-not $svc) { $svc = Get-Service | Where-Object { $_.Name -like 'MySQL*' } | Select-Object -First 1 }
        if ($svc -and $svc.Status -ne 'Running') {
          Start-Service $svc.Name -ErrorAction SilentlyContinue
          $svc.WaitForStatus('Running', [TimeSpan]::FromSeconds(30))
          Write-Output "STARTED MySQL service: $($svc.Name)"
        }

        $testConn2 = & $mysqlBin -u root -p"$rootPwd" -N -e "SELECT 1;" 2>&1
        if ($LASTEXITCODE -ne 0) {
          if ($svc) { Restart-Service $svc.Name -Force; $svc.WaitForStatus('Running', [TimeSpan]::FromSeconds(30)) }
          $testConn3 = & $mysqlBin -u root -p"$rootPwd" -N -e "SELECT 1;" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "MySQL is not running and cannot be started. Check my.ini at $myIni"
            exit 1
          }
        }

        $check = & $mysqlBin -u root -p"$rootPwd" -N -e "SELECT COUNT(*) FROM information_schema.plugins WHERE plugin_name='mysql_native_password' AND plugin_status='ACTIVE';" 2>&1
        if ("$check".Trim() -match '^1') {
          Write-Output "mysql_native_password plugin is already active"
          exit 0
        }

        # --- Step 3: Try INSTALL PLUGIN at runtime first (no restart needed) ---
        & $mysqlBin -u root -p"$rootPwd" -e "INSTALL PLUGIN mysql_native_password SONAME 'mysql_native_password.dll';" 2>&1
        $recheck = & $mysqlBin -u root -p"$rootPwd" -N -e "SELECT COUNT(*) FROM information_schema.plugins WHERE plugin_name='mysql_native_password' AND plugin_status='ACTIVE';" 2>&1
        if ("$recheck".Trim() -match '^1') {
          Write-Output "INSTALLED mysql_native_password plugin via INSTALL PLUGIN"
          exit 0
        }

        # --- Step 4: Add mysql_native_password=ON to my.ini under [mysqld] and restart ---
        if (-not $myIni) {
          Write-Error "Cannot find my.ini to enable mysql_native_password"
          exit 1
        }

        $raw = Get-Content $myIni -Raw
        # Check if already present
        if ($raw -match '(?m)^mysql_native_password\s*=\s*ON') {
          Write-Output "mysql_native_password=ON already in $myIni, restarting MySQL"
        } else {
          # Add under [mysqld] section
          if ($raw -match '(?m)^\[mysqld\]') {
            $raw = $raw -replace '(?m)(^\[mysqld\]\s*\r?\n)', "`$1mysql_native_password=ON`r`n"
            [System.IO.File]::WriteAllText($myIni, $raw)
            Write-Output "ADDED mysql_native_password=ON to $myIni"
          } else {
            Write-Error "No [mysqld] section found in $myIni"
            exit 1
          }
        }

        # Restart MySQL to load the plugin
        if ($svc) {
          Restart-Service $svc.Name -Force
          $svc.WaitForStatus('Running', [TimeSpan]::FromSeconds(30))
          Write-Output "RESTARTED MySQL service"
        }

        # Verify plugin is now active
        $finalCheck = & $mysqlBin -u root -p"$rootPwd" -N -e "SELECT COUNT(*) FROM information_schema.plugins WHERE plugin_name='mysql_native_password' AND plugin_status='ACTIVE';" 2>&1
        if ("$finalCheck".Trim() -match '^1') {
          Write-Output "mysql_native_password plugin is now active after restart"
          exit 0
        }

        Write-Error "FAILED: mysql_native_password plugin could not be enabled"
        exit 1
        {% endraw %}
      register: win_mysql_plugin_result
      changed_when: "'ADDED' in win_mysql_plugin_result.stdout or 'INSTALLED' in win_mysql_plugin_result.stdout or 'RESTARTED' in win_mysql_plugin_result.stdout"

    - name: Create Azure Migrate MySQL user with discovery privileges (Windows)
      no_log: true
      win_shell: |
        $rootPwd = '{{ mysql_root_password }}'
        $migrateUser = '{{ az_migrate_user }}'
        $migratePwd = '{{ az_migrate_password }}'
        {% raw %}
        $mysqlBin = (Get-Command mysql -ErrorAction SilentlyContinue).Source
        if (!$mysqlBin) { $mysqlBin = "C:\tools\mysql\current\bin\mysql.exe" }

        # Always use mysql_native_password — Azure Migrate requires it for plain TCP auth
        $authClause = "IDENTIFIED WITH mysql_native_password BY '$migratePwd'"

        & $mysqlBin -u root -p"$rootPwd" -e "DROP USER IF EXISTS '$migrateUser'@'%';" 2>&1
        & $mysqlBin -u root -p"$rootPwd" -e "CREATE USER '$migrateUser'@'%' $authClause;" 2>&1
        if ($LASTEXITCODE -ne 0) { Write-Error "CREATE USER failed"; exit 1 }
        & $mysqlBin -u root -p"$rootPwd" -e "GRANT USAGE, PROCESS, REPLICATION CLIENT ON *.* TO '$migrateUser'@'%';" 2>&1
        & $mysqlBin -u root -p"$rootPwd" -e "GRANT SELECT ON *.* TO '$migrateUser'@'%';" 2>&1
        & $mysqlBin -u root -p"$rootPwd" -e "FLUSH PRIVILEGES;" 2>&1

        # Verify user was created with mysql_native_password
        $plugin = & $mysqlBin -u root -p"$rootPwd" -N -e "SELECT plugin FROM mysql.user WHERE user='$migrateUser' AND host='%';" 2>&1
        $pluginVal = ($plugin | Where-Object { $_ -notmatch 'Warning' }).Trim()
        Write-Output "Auth plugin after setup: $pluginVal"

        if (-not $pluginVal -or $pluginVal -eq '') {
          Write-Error "FAILED: user was not created"
          exit 1
        }
        if ($pluginVal -ne 'mysql_native_password') {
          Write-Error "FAILED: user auth plugin is '$pluginVal' instead of 'mysql_native_password'. Azure Migrate requires mysql_native_password for plain TCP connections."
          exit 1
        }
        {% endraw %}
      changed_when: false
      failed_when: false
      register: win_mysql_create_result

    - name: Show MySQL user creation error (Windows)
      debug:
        msg: "MySQL error: {{ win_mysql_create_result.stderr }}"
      when: win_mysql_create_result.rc != 0

    - name: Fail if MySQL user creation failed (Windows)
      fail:
        msg: "Failed to create Azure Migrate MySQL user. See error above."
      when: win_mysql_create_result.rc != 0

    # ── Validation: MySQL (Windows) ──
    - name: "[VALIDATE] Check MySQL user exists, auth plugin, and grants (Windows)"
      no_log: true
      win_shell: |
        $mysqlBin = (Get-Command mysql -ErrorAction SilentlyContinue).Source
        if (!$mysqlBin) { $mysqlBin = "C:\tools\mysql\current\bin\mysql.exe" }
        Write-Output "=== USER ==="
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "SELECT user, host, plugin FROM mysql.user WHERE user='{{ az_migrate_user }}';"
        Write-Output "=== GRANTS ==="
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "SHOW GRANTS FOR '{{ az_migrate_user }}'@'%';"
      register: win_mysql_validate
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Check MySQL port 3306 binding (Windows)"
      win_shell: |
        netstat -an | Select-String ':3306.*LISTEN'
      register: win_mysql_port_check
      changed_when: false
      ignore_errors: true

    - name: "[VALIDATE] Test MySQL password authentication (Windows)"
      no_log: true
      win_shell: |
        $mysqlBin = (Get-Command mysql -ErrorAction SilentlyContinue).Source
        if (!$mysqlBin) { $mysqlBin = "C:\tools\mysql\current\bin\mysql.exe" }
        # With mysql_native_password, plain TCP auth should work without SSL/RSA
        $result = & $mysqlBin -h 127.0.0.1 -u "{{ az_migrate_user }}" -p"{{ az_migrate_password }}" -e "SELECT 1;" 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Auth test failed: $result"
          exit 1
        }
        Write-Output $result
      register: win_mysql_auth_test
      changed_when: false
      ignore_errors: true

    - name: "[RESULT] MySQL validation summary (Windows)"
      debug:
        msg:
          - "──────────────────────────────────────────"
          - "HOST: {{ inventory_hostname }}"
          - "Validation output: {{ win_mysql_validate.stdout_lines | default(['NOT FOUND ✗']) }}"
          - "Port 3306 binding: {{ win_mysql_port_check.stdout_lines | default(['NOT FOUND ✗']) }}"
          - "Password auth test: {{ 'PASS ✓' if win_mysql_auth_test.rc == 0 else 'FAIL ✗' }}"
          - "──────────────────────────────────────────"
