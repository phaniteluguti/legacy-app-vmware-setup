---
# =============================================================================
# Windows Java 3-Tier — App Server VM: Spring PetClinic REST on Standalone Tomcat
# Connects to PostgreSQL on the database VM
# Standalone Tomcat deployment for Azure Migrate web app discovery
# =============================================================================
- name: Deploy PetClinic REST on Standalone Tomcat (Windows Java 3-Tier)
  hosts: win_java_appserver
  gather_facts: true
  become: false
  vars_files:
    - ../../group_vars/all.yml
  vars:
    db_host: "{{ hostvars[groups['win_java_database'][0]]['ansible_host'] | default(groups['win_java_database'][0]) }}"
    petclinic_rest_port: 9966
    tomcat_version: "11.0.21"
    tomcat_major: "11"
    tomcat_install_dir: 'C:\Tomcat'

  tasks:
    - name: Wait for PostgreSQL on database VM to be reachable
      win_wait_for:
        host: "{{ db_host }}"
        port: 5432
        timeout: 120
        state: started

    # ---- Chocolatey & JDK ----
    - name: Install Chocolatey
      win_shell: |
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        }
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Install OpenJDK {{ java_version }} via Chocolatey
      win_chocolatey:
        name: "microsoft-openjdk-{{ java_version }}"
        state: present

    - name: Detect JDK install path
      win_shell: |
        $jdkPath = Get-ChildItem "C:\Program Files\Microsoft" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match 'jdk-{{ java_version }}' } | Select-Object -First 1 -ExpandProperty FullName
        if (-not $jdkPath) {
          $jdkPath = Get-ChildItem "C:\Program Files" -Directory | Where-Object { $_.Name -match 'jdk.*{{ java_version }}' -or $_.Name -match 'OpenJDK.*{{ java_version }}' } | Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $jdkPath) {
          $jdkPath = Get-ChildItem "C:\Program Files\Eclipse Adoptium" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match '{{ java_version }}' } | Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $jdkPath) {
          $jdkPath = (Get-Command java -ErrorAction SilentlyContinue).Source | Split-Path | Split-Path
        }
        Write-Output $jdkPath
      register: jdk_detect
      changed_when: false

    - name: Set JAVA_HOME fact
      set_fact:
        java_home_path: "{{ jdk_detect.stdout | trim }}"

    - name: Set JAVA_HOME environment variable
      win_environment:
        name: JAVA_HOME
        value: '{{ java_home_path }}'
        level: machine
        state: present

    - name: Add Java to PATH
      win_path:
        elements:
          - '{{ java_home_path }}\bin'
        state: present

    - name: Install Git via Chocolatey
      win_chocolatey:
        name: git
        state: present

    # ---- Download & Install Standalone Tomcat ----
    - name: Download Apache Tomcat {{ tomcat_version }}
      win_shell: |
        New-Item -Path "C:\Temp" -ItemType Directory -Force | Out-Null
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        Invoke-WebRequest -Uri "https://archive.apache.org/dist/tomcat/tomcat-{{ tomcat_major }}/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.zip" -OutFile "C:\Temp\apache-tomcat-{{ tomcat_version }}.zip" -UseBasicParsing
      args:
        creates: 'C:\Temp\apache-tomcat-{{ tomcat_version }}.zip'

    - name: Check current Tomcat version
      win_shell: |
        if (Test-Path "{{ tomcat_install_dir }}\RELEASE-NOTES") {
          $notes = Get-Content "{{ tomcat_install_dir }}\RELEASE-NOTES" -Raw
          if ($notes -match 'Apache Tomcat Version ([0-9.]+)') { $Matches[1] } else { "unknown" }
        } else { "none" }
      register: current_tomcat_version
      changed_when: false

    - name: Remove old Tomcat if version has changed
      win_file:
        path: '{{ tomcat_install_dir }}'
        state: absent
      when: current_tomcat_version.stdout | trim != tomcat_version

    - name: Extract and install Tomcat
      win_shell: |
        Expand-Archive -Path "C:\Temp\apache-tomcat-{{ tomcat_version }}.zip" -DestinationPath "C:\Temp\tomcat-extract" -Force
        New-Item -Path "{{ tomcat_install_dir }}" -ItemType Directory -Force | Out-Null
        Copy-Item -Path "C:\Temp\tomcat-extract\apache-tomcat-{{ tomcat_version }}\*" -Destination "{{ tomcat_install_dir }}" -Recurse -Force
        Remove-Item -Path "C:\Temp\tomcat-extract" -Recurse -Force
      args:
        creates: '{{ tomcat_install_dir }}\bin\catalina.bat'

    - name: Configure Tomcat port to {{ petclinic_rest_port }}
      win_shell: |
        $xml = Get-Content "{{ tomcat_install_dir }}\conf\server.xml" -Raw
        if ($xml -match 'Connector port="{{ petclinic_rest_port }}"') {
          Write-Output "OK"
        } else {
          $xml = $xml -replace 'Connector port="\d+"', 'Connector port="{{ petclinic_rest_port }}"'
          Set-Content "{{ tomcat_install_dir }}\conf\server.xml" $xml
          Write-Output "CHANGED"
        }
      register: port_config
      changed_when: "'CHANGED' in port_config.stdout"

    - name: Remove default Tomcat webapps
      win_file:
        path: '{{ tomcat_install_dir }}\webapps\{{ item }}'
        state: absent
      loop: [ROOT, docs, examples, host-manager, manager]

    - name: Create setenv.bat for Spring profiles
      win_copy:
        dest: '{{ tomcat_install_dir }}\bin\setenv.bat'
        content: |
          @echo off
          set "CATALINA_OPTS=-Dspring.profiles.active=postgresql,spring-data-jpa"

    - name: Set CATALINA_HOME environment variable
      win_environment:
        name: CATALINA_HOME
        value: '{{ tomcat_install_dir }}'
        level: machine
        state: present

    # ---- Clone & Configure PetClinic REST ----
    - name: Clone spring-petclinic-rest repository
      win_shell: |
        & "C:\Program Files\Git\bin\git.exe" clone https://github.com/spring-petclinic/spring-petclinic-rest.git C:\Apps\petclinic-rest
      args:
        creates: C:\Apps\petclinic-rest\pom.xml

    - name: Create PostgreSQL application properties
      win_copy:
        dest: C:\Apps\petclinic-rest\src\main\resources\application-postgresql.properties
        content: |
          database=postgresql
          spring.datasource.url=jdbc:postgresql://{{ db_host }}:5432/{{ postgres_db }}
          spring.datasource.username={{ postgres_user }}
          spring.datasource.password={{ postgres_password }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.database=POSTGRESQL
          spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.generate-ddl=true
          spring.sql.init.continue-on-error=true
      register: props_source

    - name: Remove target to force rebuild when properties changed
      win_file:
        path: C:\Apps\petclinic-rest\target
        state: absent
      when: props_source is changed

    # ---- Convert to WAR packaging ----
    - name: Set WAR packaging in pom.xml
      win_shell: |
        $pomPath = "C:\Apps\petclinic-rest\pom.xml"
        $content = [System.IO.File]::ReadAllText($pomPath)
        if ($content -notmatch '<packaging>') {
          $content = $content -replace '(<artifactId>spring-petclinic-rest</artifactId>)', "`$1`n    <packaging>war</packaging>"
          [System.IO.File]::WriteAllText($pomPath, $content)
          Write-Output "CHANGED"
        } else {
          Write-Output "OK"
        }
      register: war_packaging
      changed_when: "'CHANGED' in war_packaging.stdout"

    - name: Add provided-scope Tomcat dependency
      win_shell: |
        $pomPath = "C:\Apps\petclinic-rest\pom.xml"
        $content = [System.IO.File]::ReadAllText($pomPath)
        if ($content -notmatch 'spring-boot-starter-tomcat') {
          $dep = @"

            <!-- Tomcat provided for WAR deployment -->
            <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter-tomcat</artifactId>
                <scope>provided</scope>
            </dependency>
        "@
          $content = $content -replace '(<dependencies>\s*\r?\n)', "`$1$dep`n"
          [System.IO.File]::WriteAllText($pomPath, $content)
          Write-Output "CHANGED"
        } else {
          Write-Output "OK"
        }
      register: tomcat_dep
      changed_when: "'CHANGED' in tomcat_dep.stdout"

    - name: Remove target when pom.xml changed
      win_file:
        path: C:\Apps\petclinic-rest\target
        state: absent
      when: war_packaging is changed or tomcat_dep is changed

    - name: Detect application class details
      win_shell: |
        $appFile = Get-ChildItem -Path "C:\Apps\petclinic-rest\src\main\java" -Recurse -Filter "*Application*.java" | Select-Object -First 1
        $pkgPath = $appFile.DirectoryName -replace '.*\\src\\main\\java\\', ''
        $pkgName = $pkgPath -replace '\\', '.'
        $className = $appFile.BaseName
        Write-Output "$pkgPath|$pkgName|$className"
      register: app_detect
      changed_when: false

    - name: Parse application class details
      set_fact:
        app_pkg_path: "{{ app_detect.stdout.split('|')[0] | trim }}"
        app_pkg_name: "{{ app_detect.stdout.split('|')[1] | trim }}"
        app_class_name: "{{ app_detect.stdout.split('|')[2] | trim }}"

    - name: Create ServletInitializer for WAR deployment
      win_copy:
        dest: 'C:\Apps\petclinic-rest\src\main\java\{{ app_pkg_path }}\ServletInitializer.java'
        content: |
          package {{ app_pkg_name }};

          import org.springframework.boot.builder.SpringApplicationBuilder;
          import org.springframework.boot.web.servlet.support.SpringBootServletInitializer;

          public class ServletInitializer extends SpringBootServletInitializer {
              @Override
              protected SpringApplicationBuilder configure(SpringApplicationBuilder application) {
                  return application.sources({{ app_class_name }}.class);
              }
          }

    # ---- Build & Deploy WAR ----
    - name: Check if WAR already built
      win_find:
        paths: C:\Apps\petclinic-rest\target
        patterns: "*.war"
        file_type: file
      register: existing_war

    - name: Build PetClinic REST as WAR
      win_shell: |
        Set-Location C:\Apps\petclinic-rest
        $env:JAVA_HOME = "{{ java_home_path }}"
        .\mvnw.cmd package -DskipTests -Djacoco.skip=true
      timeout: 600
      when: existing_war.files | length == 0

    - name: Find built WAR file
      win_find:
        paths: C:\Apps\petclinic-rest\target
        patterns: "*.war"
        file_type: file
      register: war_files

    - name: Deploy WAR to Tomcat
      win_copy:
        src: "{{ war_files.files[0].path }}"
        dest: '{{ tomcat_install_dir }}\webapps\petclinic.war'
        remote_src: true
      when: war_files.files | length > 0

    # ---- Tomcat Windows Service via NSSM ----
    - name: Install NSSM
      win_chocolatey:
        name: nssm
        state: present

    - name: Create logs directory
      win_file:
        path: '{{ tomcat_install_dir }}\logs'
        state: directory

    - name: Stop Tomcat service if it exists (for re-provisioning)
      win_service:
        name: Tomcat
        state: stopped
      ignore_errors: true

    - name: Remove existing Tomcat service (for re-provisioning)
      win_shell: nssm remove Tomcat confirm
      ignore_errors: true

    - name: Install Tomcat as Windows service
      win_shell: |
        nssm install Tomcat "{{ tomcat_install_dir }}\bin\catalina.bat" run
        nssm set Tomcat AppDirectory "{{ tomcat_install_dir }}"
        nssm set Tomcat DisplayName "Apache Tomcat {{ tomcat_major }}"
        nssm set Tomcat Description "Apache Tomcat Web Application Container"
        nssm set Tomcat Start SERVICE_AUTO_START
        nssm set Tomcat AppEnvironmentExtra "JAVA_HOME={{ java_home_path }}" "CATALINA_HOME={{ tomcat_install_dir }}"
        nssm set Tomcat AppStdout "{{ tomcat_install_dir }}\logs\stdout.log"
        nssm set Tomcat AppStderr "{{ tomcat_install_dir }}\logs\stderr.log"
        nssm set Tomcat AppStdoutCreationDisposition 4
        nssm set Tomcat AppStderrCreationDisposition 4
        nssm set Tomcat AppRotateFiles 1
        nssm set Tomcat AppRotateBytes 10485760

    - name: Start Tomcat service
      win_service:
        name: Tomcat
        start_mode: auto
        state: started

    - name: Wait for Tomcat to be ready
      win_wait_for:
        port: "{{ petclinic_rest_port }}"
        timeout: 180
      register: wait_result
      ignore_errors: true

    - name: Show service status if startup failed
      win_shell: |
        Write-Output "=== Service Status ==="
        Get-Service Tomcat | Format-List *
        Write-Output ""
        Write-Output "=== Last 50 lines of stderr.log ==="
        if (Test-Path "{{ tomcat_install_dir }}\logs\stderr.log") {
          Get-Content "{{ tomcat_install_dir }}\logs\stderr.log" -Tail 50
        } else {
          Write-Output "(no stderr.log found)"
        }
        Write-Output ""
        Write-Output "=== Last 50 lines of catalina log ==="
        $clog = Get-ChildItem "{{ tomcat_install_dir }}\logs" -Filter "catalina*.log" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($clog) {
          Get-Content $clog.FullName -Tail 50
        } else {
          Write-Output "(no catalina log found)"
        }
      register: debug_output
      when: wait_result is failed

    - name: Display service debug info
      debug:
        var: debug_output.stdout_lines
      when: wait_result is failed

    - name: Fail if Tomcat did not start
      fail:
        msg: "Tomcat service failed to start on port {{ petclinic_rest_port }}. Check logs above."
      when: wait_result is failed

    - name: Allow Tomcat port through Windows Firewall
      win_firewall_rule:
        name: "Apache Tomcat Inbound"
        localport: "{{ petclinic_rest_port }}"
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Ensure WinRM service is running
      win_service:
        name: WinRM
        start_mode: auto
        state: started

    - name: Enable RDP
      win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    - name: Allow RDP through firewall
      win_firewall_rule:
        name: "Remote Desktop"
        localport: 3389
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true
