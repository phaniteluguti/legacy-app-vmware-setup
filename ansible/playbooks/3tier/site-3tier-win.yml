---
# =============================================================================
# Master Playbook — Windows 3-Tier Architecture
# Deploys databases first, then app servers, then frontends
# Usage: ansible-playbook -i inventory/hosts.ini playbooks/3tier/site-3tier-win.yml
# =============================================================================

# --- Phase 0: Wait for WinRM on all Windows 3-tier VMs ---
- name: Wait for WinRM connectivity on Windows 3-tier VMs
  hosts: win_servers_3tier
  gather_facts: false
  become: false
  tasks:
    - name: Wait for WinRM port 5985 to be reachable
      delegate_to: localhost
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 5985
        timeout: 300
        delay: 10
        state: started

    - name: Wait for WinRM connection to succeed
      wait_for_connection:
        timeout: 300
        delay: 5
        sleep: 10

# --- Phase 1: Databases (must come first) ---
- import_playbook: win-java-database.yml
- import_playbook: win-dotnet-database.yml
- import_playbook: win-php-database.yml

# --- Phase 2: Application Servers ---
- import_playbook: win-java-appserver.yml
- import_playbook: win-dotnet-appserver.yml
- import_playbook: win-php-appserver.yml

# --- Phase 3: Frontends ---
- import_playbook: win-java-frontend.yml
- import_playbook: win-dotnet-frontend.yml
- import_playbook: win-php-frontend.yml
