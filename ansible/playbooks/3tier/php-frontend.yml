---
# =============================================================================
# LAMP 3-Tier — Frontend VM: Nginx reverse proxy
# Proxies requests to WordPress/Apache on the app-server VM (port 8080)
# =============================================================================
- name: Deploy Nginx Frontend (LAMP 3-Tier)
  hosts: php_frontend
  become: true
  vars_files:
    - ../../group_vars/all.yml
  vars:
    app_host: "{{ hostvars[groups['php_appserver'][0]]['ansible_host'] | default(groups['php_appserver'][0]) }}"
    wp_app_port: 8080

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Configure Nginx as reverse proxy for WordPress
      copy:
        dest: /etc/nginx/sites-available/wordpress
        content: |
          server {
              listen 80;
              server_name _;

              client_max_body_size 64M;

              location / {
                  proxy_pass         http://{{ app_host }}:{{ wp_app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection keep-alive;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 300;
                  proxy_connect_timeout 300;
              }
          }
      notify: Restart Nginx

    - name: Enable the Nginx site
      file:
        src: /etc/nginx/sites-available/wordpress
        dest: /etc/nginx/sites-enabled/wordpress
        state: link
      notify: Restart Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart Nginx

    - name: Ensure Nginx is started and enabled
      systemd:
        name: nginx
        state: started
        enabled: true

    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
