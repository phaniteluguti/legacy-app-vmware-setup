---
# =============================================================================
# Java 3-Tier — Frontend VM: Angular SPA served by Nginx
# Proxies API requests to the app-server VM (port 9966)
# =============================================================================
- name: Deploy PetClinic Angular Frontend (Java 3-Tier)
  hosts: java_frontend
  become: true
  vars_files:
    - ../../group_vars/all.yml
  vars:
    app_host: "{{ hostvars[groups['java_appserver'][0]]['ansible_host'] | default(groups['java_appserver'][0]) }}"
    petclinic_rest_port: 9966

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name: [git, curl, wget, gnupg2, software-properties-common, ca-certificates, nginx]
        state: present

    - name: Install Node.js 18.x repository
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list
        executable: /bin/bash

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Set git safe.directory globally
      command: git config --global --add safe.directory '*'
      changed_when: false

    - name: Clone spring-petclinic-angular repository
      command: git clone https://github.com/spring-petclinic/spring-petclinic-angular.git /opt/petclinic-angular
      args:
        creates: /opt/petclinic-angular/package.json

    - name: Install npm dependencies
      shell: npm install
      args:
        chdir: /opt/petclinic-angular
        creates: /opt/petclinic-angular/node_modules

    - name: Build Angular app for production
      shell: npx ng build --configuration production
      args:
        chdir: /opt/petclinic-angular
        creates: /opt/petclinic-angular/dist
      environment:
        NODE_OPTIONS: "--max-old-space-size=2048"

    - name: Find Angular dist output directory
      find:
        paths: /opt/petclinic-angular/dist
        file_type: directory
      register: dist_dirs

    - name: Set dist path fact
      set_fact:
        angular_dist: "{{ dist_dirs.files[0].path if dist_dirs.files | length > 0 else '/opt/petclinic-angular/dist' }}"

    - name: Copy built Angular app to Nginx web root
      shell: |
        rm -rf /var/www/petclinic
        cp -r {{ angular_dist }} /var/www/petclinic
        chown -R www-data:www-data /var/www/petclinic
      args:
        executable: /bin/bash

    - name: Configure Nginx for Angular SPA with API proxy
      copy:
        dest: /etc/nginx/sites-available/petclinic
        content: |
          server {
              listen 80;
              server_name _;
              root /var/www/petclinic;
              index index.html;

              # Angular SPA — serve index.html for all routes
              location / {
                  try_files $uri $uri/ /index.html;
              }

              # Proxy API requests to the app server
              location /petclinic/api/ {
                  proxy_pass http://{{ app_host }}:{{ petclinic_rest_port }}/petclinic/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      notify: Restart Nginx

    - name: Enable petclinic Nginx site
      file:
        src: /etc/nginx/sites-available/petclinic
        dest: /etc/nginx/sites-enabled/petclinic
        state: link
      notify: Restart Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart Nginx

    - name: Ensure Nginx is started and enabled
      systemd:
        name: nginx
        state: started
        enabled: true

    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
