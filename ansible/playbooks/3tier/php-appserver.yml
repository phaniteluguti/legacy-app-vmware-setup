---
# =============================================================================
# LAMP 3-Tier — App Server VM: Apache + PHP + WordPress
# Connects to MySQL on the database VM
# =============================================================================
- name: Deploy WordPress App Server (LAMP 3-Tier)
  hosts: php_appserver
  become: true
  vars_files:
    - ../../group_vars/all.yml
  vars:
    db_host: "{{ hostvars[groups['php_database'][0]]['ansible_host'] | default(groups['php_database'][0]) }}"
    fe_host: "{{ hostvars[groups['php_frontend'][0]]['ansible_host'] | default(groups['php_frontend'][0]) }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name: [git, curl, wget, gnupg2, software-properties-common, ca-certificates, unzip, acl, tar]
        state: present

    - name: Add PHP PPA repository
      ansible.builtin.apt_repository:
        repo: "ppa:ondrej/php"
        state: present

    - name: Install PHP {{ php_version }} and extensions
      apt:
        name:
          - "php{{ php_version }}"
          - "php{{ php_version }}-cli"
          - "php{{ php_version }}-fpm"
          - "php{{ php_version }}-mysql"
          - "php{{ php_version }}-xml"
          - "php{{ php_version }}-mbstring"
          - "php{{ php_version }}-curl"
          - "php{{ php_version }}-zip"
          - "php{{ php_version }}-gd"
          - "php{{ php_version }}-intl"
          - "php{{ php_version }}-soap"
          - "php{{ php_version }}-imagick"
          - "libapache2-mod-php{{ php_version }}"
        state: present
        update_cache: true

    - name: Install Apache2
      apt:
        name: apache2
        state: present

    - name: Enable Apache mod_rewrite
      apache2_module:
        name: rewrite
        state: present
      notify: Restart Apache

    - name: Enable Apache mod_php
      apache2_module:
        name: "php{{ php_version }}"
        state: present
      notify: Restart Apache

    # ---------------------------------------------------------------
    # Deploy WordPress
    # ---------------------------------------------------------------
    - name: Download WordPress
      get_url:
        url: "https://wordpress.org/wordpress-{{ wp_version }}.tar.gz"
        dest: /tmp/wordpress.tar.gz

    - name: Remove stale WordPress directory
      file:
        path: /var/www/wordpress
        state: absent

    - name: Extract WordPress
      unarchive:
        src: /tmp/wordpress.tar.gz
        dest: /var/www/
        remote_src: true
        owner: www-data
        group: www-data

    - name: Install WP-CLI
      get_url:
        url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        dest: /usr/local/bin/wp
        mode: "0755"

    - name: Generate WordPress wp-config.php (remote DB)
      copy:
        dest: /var/www/wordpress/wp-config.php
        owner: www-data
        group: www-data
        mode: "0640"
        content: |
          <?php
          define('DB_NAME',     '{{ wp_db_name }}');
          define('DB_USER',     '{{ wp_db_user }}');
          define('DB_PASSWORD', '{{ wp_db_password }}');
          define('DB_HOST',     '{{ db_host }}');
          define('DB_CHARSET',  'utf8mb4');
          define('DB_COLLATE',  '');
          $table_prefix = 'wp_';
          define('AUTH_KEY',         '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('SECURE_AUTH_KEY',  '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('LOGGED_IN_KEY',    '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('NONCE_KEY',        '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('AUTH_SALT',        '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('SECURE_AUTH_SALT', '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('LOGGED_IN_SALT',   '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('NONCE_SALT',       '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('WP_DEBUG', false);
          define('WP_HOME',    'http://{{ fe_host }}');
          define('WP_SITEURL', 'http://{{ fe_host }}');
          if ( ! defined('ABSPATH') ) { define('ABSPATH', __DIR__ . '/'); }
          require_once ABSPATH . 'wp-settings.php';

    - name: Run WordPress CLI install
      shell: |
        sudo -u www-data wp core install \
          --url="http://{{ fe_host }}" \
          --title="{{ wp_site_title }}" \
          --admin_user="{{ wp_admin_user }}" \
          --admin_password="{{ wp_admin_password }}" \
          --admin_email="{{ wp_admin_email }}" \
          --path=/var/www/wordpress \
          --skip-email
      args:
        executable: /bin/bash

    - name: Create sample pages and posts with WP-CLI
      shell: |
        cd /var/www/wordpress
        sudo -u www-data wp post create --post_type=page --post_title='About Us' \
          --post_content='This is a legacy LAMP-stack WordPress site deployed in a 3-tier architecture on VMware for Azure Migrate assessment.' \
          --post_status=publish --path=/var/www/wordpress
        sudo -u www-data wp post create --post_type=page --post_title='Contact' \
          --post_content='<p>Email: admin@example.com</p><p>Phone: +1-555-0100</p>' \
          --post_status=publish --path=/var/www/wordpress
        sudo -u www-data wp post create --post_type=post --post_title='Welcome to our Legacy App' \
          --post_content='This WordPress application runs on a distributed LAMP stack: Nginx frontend proxy, Apache+PHP app server, and MySQL database — each on its own VM.' \
          --post_status=publish --path=/var/www/wordpress
        sudo -u www-data wp post create --post_type=post --post_title='3-Tier LAMP Architecture' \
          --post_content='<h3>Tier 1 - Frontend</h3><p>Nginx reverse proxy</p><h3>Tier 2 - Application</h3><p>Apache {{ php_version }} + WordPress</p><h3>Tier 3 - Database</h3><p>MySQL 8.0</p>' \
          --post_status=publish --path=/var/www/wordpress
      args:
        executable: /bin/bash
      ignore_errors: true

    - name: Install and activate a classic WordPress theme
      shell: |
        cd /var/www/wordpress
        sudo -u www-data wp theme install twentytwentyone --activate --path=/var/www/wordpress
      args:
        executable: /bin/bash
      ignore_errors: true

    - name: Set WordPress file permissions
      file:
        path: /var/www/wordpress
        owner: www-data
        group: www-data
        recurse: true

    - name: Set directory permissions for wp-content
      file:
        path: /var/www/wordpress/wp-content
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
        recurse: true

    # ---------------------------------------------------------------
    # Apache Virtual Host (port 8080 — behind Nginx proxy)
    # ---------------------------------------------------------------
    - name: Configure Apache to listen on port 8080
      lineinfile:
        path: /etc/apache2/ports.conf
        regexp: "^Listen 80"
        line: "Listen 8080"
      notify: Restart Apache

    - name: Configure Apache virtual host for WordPress
      copy:
        dest: /etc/apache2/sites-available/wordpress.conf
        content: |
          <VirtualHost *:8080>
              ServerName {{ fe_host }}
              DocumentRoot /var/www/wordpress

              <Directory /var/www/wordpress>
                  AllowOverride All
                  Require all granted
                  Options -Indexes +FollowSymLinks
              </Directory>

              ErrorLog ${APACHE_LOG_DIR}/wordpress-error.log
              CustomLog ${APACHE_LOG_DIR}/wordpress-access.log combined
          </VirtualHost>
      notify: Restart Apache

    - name: Enable WordPress site
      shell: a2ensite wordpress.conf
      notify: Restart Apache

    - name: Disable default Apache site
      shell: a2dissite 000-default.conf
      notify: Restart Apache

    - name: Ensure Apache is started and enabled
      systemd:
        name: apache2
        state: started
        enabled: true

    - name: Allow app server port through UFW
      ufw:
        rule: allow
        port: "8080"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart Apache
      systemd:
        name: apache2
        state: restarted
