---
# =============================================================================
# Windows PHP 3-Tier — Frontend VM: IIS reverse proxy to Laravel on app server
# Same Laravel app as Linux, proxied through IIS (like Nginx on Linux)
# =============================================================================
- name: Deploy IIS Frontend (Windows PHP 3-Tier)
  hosts: win_php_frontend
  gather_facts: true
  become: false
  vars_files:
    - ../../group_vars/all.yml
  vars:
    app_host: "{{ hostvars[groups['win_php_appserver'][0]]['ansible_host'] | default(groups['win_php_appserver'][0]) }}"
    laravel_port: 8000

  tasks:
    - name: Install IIS with required features
      win_feature:
        name:
          - Web-Server
          - Web-Mgmt-Console
          - Web-Mgmt-Tools
        state: present
      register: iis_install

    - name: Reboot if IIS install requires it
      win_reboot:
      when: iis_install.reboot_required | default(false)

    - name: Install Chocolatey
      win_shell: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Install IIS URL Rewrite and ARR modules
      win_chocolatey:
        name: "{{ item }}"
        state: present
      loop:
        - urlrewrite
        - iis-arr

    - name: Enable ARR proxy globally
      win_shell: >
        & "$env:windir\system32\inetsrv\appcmd.exe" set config
        -section:system.webServer/proxy /enabled:"True" /commit:apphost
      changed_when: false
      ignore_errors: true

    - name: Unlock httpErrors section
      win_shell: >
        & "$env:windir\system32\inetsrv\appcmd.exe" unlock config
        -section:system.webServer/httpErrors
      changed_when: false
      ignore_errors: true

    - name: Create frontend web directory
      win_file:
        path: C:\inetpub\LaravelFrontend
        state: directory

    - name: Create web.config with reverse proxy to Laravel
      win_copy:
        dest: C:\inetpub\LaravelFrontend\web.config
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration>
            <system.webServer>
              <httpErrors existingResponse="PassThrough" />
              <rewrite>
                <rules>
                  <rule name="ReverseProxy to Laravel App Server" stopProcessing="true">
                    <match url="(.*)" />
                    <action type="Rewrite" url="http://{{ app_host }}:{{ laravel_port }}/{R:1}" />
                  </rule>
                </rules>
              </rewrite>
            </system.webServer>
          </configuration>

    - name: Remove default IIS website
      win_iis_website:
        name: "Default Web Site"
        state: absent

    - name: Create IIS application pool (No Managed Code)
      win_iis_webapppool:
        name: LaravelFrontendPool
        state: started
        attributes:
          managedRuntimeVersion: ''

    - name: Create IIS website
      win_iis_website:
        name: LaravelFrontend
        state: started
        port: 80
        physical_path: C:\inetpub\LaravelFrontend
        application_pool: LaravelFrontendPool

    - name: Allow HTTP through Windows Firewall
      win_firewall_rule:
        name: "HTTP Inbound"
        localport: 80
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Reset IIS to apply ARR and rewrite changes
      win_shell: iisreset /restart
      changed_when: false

    - name: Verify app server is reachable from frontend
      win_uri:
        url: "http://{{ app_host }}:{{ laravel_port }}/"
        return_content: false
        status_code: [200, 302]
      register: app_check
      retries: 5
      delay: 10
      until: app_check.status_code is defined
      ignore_errors: true

    - name: Warn if app server is not reachable
      debug:
        msg: "WARNING — Laravel at {{ app_host }}:{{ laravel_port }} is not responding. Deploy the app server first."
      when: app_check is failed
