---
# =============================================================================
# Windows .NET 3-Tier — Frontend VM: IIS reverse proxy to app server
# =============================================================================
- name: Deploy IIS Frontend (Windows .NET 3-Tier)
  hosts: win_dotnet_frontend
  gather_facts: true
  become: false
  vars_files:
    - ../../group_vars/all.yml
  vars:
    app_host: "{{ hostvars[groups['win_dotnet_appserver'][0]]['ansible_host'] | default(groups['win_dotnet_appserver'][0]) }}"

  tasks:
    - name: Install IIS with required features
      win_feature:
        name:
          - Web-Server
          - Web-Mgmt-Console
          - Web-Mgmt-Tools
        state: present
      register: iis_install

    - name: Reboot if IIS install requires it
      win_reboot:
      when: iis_install.reboot_required | default(false)

    - name: Install Chocolatey
      win_shell: |
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        }
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Install IIS URL Rewrite and ARR modules
      win_chocolatey:
        name: "{{ item }}"
        state: present
      loop:
        - urlrewrite
        - iis-arr

    - name: Enable ARR proxy globally
      win_shell: |
        & "$env:windir\system32\inetsrv\appcmd.exe" set config -section:system.webServer/proxy /enabled:"True" /commit:apphost
      register: arr_result
      changed_when: "'HRESULT' not in arr_result.stderr"
      ignore_errors: false

    - name: Unlock httpErrors section so web.config can override
      win_shell: |
        & "$env:windir\system32\inetsrv\appcmd.exe" unlock config -section:system.webServer/httpErrors
      changed_when: false
      ignore_errors: true

    - name: Create frontend web directory
      win_file:
        path: C:\inetpub\DotNetFrontend
        state: directory

    - name: Create web.config with reverse proxy rules
      win_copy:
        dest: C:\inetpub\DotNetFrontend\web.config
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration>
            <system.webServer>
              <httpErrors existingResponse="PassThrough" />
              <rewrite>
                <rules>
                  <rule name="ReverseProxy to App Server" stopProcessing="true">
                    <match url="(.*)" />
                    <action type="Rewrite" url="http://{{ app_host }}:80/{R:1}" />
                  </rule>
                </rules>
              </rewrite>
            </system.webServer>
          </configuration>

    - name: Remove default IIS website
      win_iis_website:
        name: "Default Web Site"
        state: absent

    - name: Create IIS application pool
      win_iis_webapppool:
        name: DotNetFrontendPool
        state: started

    - name: Create IIS website
      win_iis_website:
        name: DotNetFrontend
        state: started
        port: 80
        physical_path: C:\inetpub\DotNetFrontend
        application_pool: DotNetFrontendPool

    - name: Allow HTTP through Windows Firewall
      win_firewall_rule:
        name: "HTTP Inbound"
        localport: 80
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Reset IIS to apply ARR and rewrite changes
      win_shell: iisreset /restart
      changed_when: false

    - name: Verify app server is reachable from frontend
      win_uri:
        url: "http://{{ app_host }}/"
        return_content: false
        status_code: 200
      register: app_check
      retries: 5
      delay: 10
      until: app_check.status_code == 200
      ignore_errors: true

    - name: Warn if app server is not reachable
      debug:
        msg: "WARNING — App server at {{ app_host }} is not responding on port 80. Check IIS on the app server VM."
      when: app_check is failed

    - name: Ensure WinRM service is running
      win_service:
        name: WinRM
        start_mode: auto
        state: started

    - name: Enable RDP
      win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    - name: Allow RDP through firewall
      win_firewall_rule:
        name: "Remote Desktop"
        localport: 3389
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true
