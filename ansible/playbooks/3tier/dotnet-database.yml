---
# =============================================================================
# .NET 3-Tier — Database VM: SQL Server 2022 Express
# Accepts connections from the app-server VM
# =============================================================================
- name: Deploy SQL Server Database (.NET 3-Tier)
  hosts: dotnet_database
  become: true
  vars_files:
    - ../../group_vars/all.yml

  tasks:
    # ---- Passwordless sudo ----
    - name: Grant passwordless sudo to {{ ansible_user }}
      copy:
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ ansible_user }}"
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: Clean apt cache and fix broken state
      shell: |
        apt-get clean
        rm -rf /var/lib/apt/lists/*
        apt-get update -y || true
        apt-get -f install -y || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install base packages
      apt:
        name: [git, curl, wget, gnupg2, software-properties-common, ca-certificates]
        state: present

    - name: Add Microsoft package signing key
      shell: |
        wget -q https://packages.microsoft.com/config/ubuntu/{{ ansible_distribution_version }}/packages-microsoft-prod.deb -O /tmp/packages-microsoft-prod.deb
        dpkg -i /tmp/packages-microsoft-prod.deb
        rm -f /tmp/packages-microsoft-prod.deb
      args:
        creates: /etc/apt/sources.list.d/microsoft-prod.list

    - name: Import Microsoft GPG key for SQL Server repo
      shell: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-archive-keyring.gpg] https://packages.microsoft.com/ubuntu/{{ ansible_distribution_version }}/mssql-server-2022 {{ ansible_distribution_release }} main" > /etc/apt/sources.list.d/mssql-server-2022.list
      args:
        creates: /usr/share/keyrings/microsoft-archive-keyring.gpg

    - name: Update apt cache after adding SQL Server repo
      apt:
        update_cache: true

    - name: Install SQL Server 2022
      apt:
        name: mssql-server
        state: present

    - name: Check if SQL Server is already configured
      shell: systemctl is-active mssql-server
      register: mssql_status
      ignore_errors: true
      changed_when: false

    - name: Stop SQL Server for reconfiguration
      systemd:
        name: mssql-server
        state: stopped
      when: mssql_status.rc != 0

    - name: Configure SQL Server Express edition
      shell: |
        MSSQL_SA_PASSWORD="{{ mssql_sa_password }}" \
        MSSQL_PID="{{ mssql_edition }}" \
        /opt/mssql/bin/mssql-conf -n setup accept-eula
      environment:
        ACCEPT_EULA: "Y"
      when: mssql_status.rc != 0

    - name: Ensure SQL Server is started
      systemd:
        name: mssql-server
        state: started
        enabled: true

    - name: Install SQL Server command-line tools
      apt:
        name:
          - mssql-tools18
          - unixodbc-dev
        state: present
        update_cache: true
      environment:
        ACCEPT_EULA: "Y"

    - name: Wait for SQL Server to be ready
      shell: /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "{{ mssql_sa_password }}" -C -Q "SELECT 1"
      register: sql_ready
      retries: 10
      delay: 5
      until: sql_ready.rc == 0
      changed_when: false

    - name: Ensure SQL Server TCP port is set to 1433
      shell: /opt/mssql/bin/mssql-conf set network.tcpport 1433
      changed_when: false
      notify: Restart SQL Server

    - name: Ensure SQL Server listens on all interfaces
      shell: /opt/mssql/bin/mssql-conf set network.ipaddress 0.0.0.0
      changed_when: false
      ignore_errors: true

    - name: Create application database
      shell: |
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "{{ mssql_sa_password }}" -C -Q "
        IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = '{{ mssql_db_name }}')
        BEGIN CREATE DATABASE [{{ mssql_db_name }}] END"
      changed_when: false

    - name: Allow SQL Server port through UFW
      ufw:
        rule: allow
        port: "1433"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart SQL Server
      systemd:
        name: mssql-server
        state: restarted
