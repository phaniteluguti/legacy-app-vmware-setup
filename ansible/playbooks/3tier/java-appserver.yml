---
# =============================================================================
# Java 3-Tier — App Server VM: Spring PetClinic REST API (port 9966)
# Connects to PostgreSQL on the database VM
# =============================================================================
- name: Deploy Spring PetClinic REST API (Java 3-Tier)
  hosts: java_appserver
  become: true
  vars_files:
    - ../../group_vars/all.yml
  vars:
    db_host: "{{ hostvars[groups['java_database'][0]]['ansible_host'] | default(groups['java_database'][0]) }}"
    petclinic_rest_port: 9966

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name: [git, curl, wget, gnupg2, software-properties-common, ca-certificates, unzip]
        state: present

    - name: Install OpenJDK {{ java_version }}
      apt:
        name: "openjdk-{{ java_version }}-jdk"
        state: present

    - name: Set JAVA_HOME in /etc/environment
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: "JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64"

    - name: Create app directory
      file:
        path: /opt/petclinic-rest
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Set git safe.directory globally
      command: git config --global --add safe.directory '*'
      changed_when: false

    - name: Clone spring-petclinic-rest repository
      command: git clone https://github.com/spring-petclinic/spring-petclinic-rest.git /opt/petclinic-rest/repo
      args:
        creates: /opt/petclinic-rest/repo/pom.xml

    - name: Fix repo ownership
      file:
        path: /opt/petclinic-rest/repo
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Configure PostgreSQL connection in application-postgres.properties
      copy:
        dest: /opt/petclinic-rest/repo/src/main/resources/application-postgres.properties
        content: |
          spring.datasource.url=jdbc:postgresql://{{ db_host }}:5432/{{ postgres_db }}
          spring.datasource.username={{ postgres_user }}
          spring.datasource.password={{ postgres_password }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.database=POSTGRESQL
          spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.generate-ddl=true
          spring.sql.init.continue-on-error=true
        owner: "{{ ansible_user }}"

    - name: Build PetClinic REST API with Maven (skip tests)
      shell: |
        cd /opt/petclinic-rest/repo
        sudo -u {{ ansible_user }} bash -c 'JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64 ./mvnw clean package -DskipTests'
      args:
        executable: /bin/bash

    - name: Find built JAR
      find:
        paths: /opt/petclinic-rest/repo/target
        patterns: "spring-petclinic-rest*.jar"
        excludes: "*-sources.jar,*-javadoc.jar,original-*.jar,*.original"
      register: jar_files

    - name: Copy JAR to /opt/petclinic-rest
      copy:
        src: "{{ jar_files.files[0].path }}"
        dest: /opt/petclinic-rest/petclinic-rest.jar
        remote_src: true
        owner: "{{ ansible_user }}"
      when: jar_files.files | length > 0

    - name: Create PetClinic REST systemd service
      copy:
        dest: /etc/systemd/system/petclinic-rest.service
        content: |
          [Unit]
          Description=Spring PetClinic REST API
          After=network.target

          [Service]
          Type=simple
          User={{ ansible_user }}
          WorkingDirectory=/opt/petclinic-rest
          ExecStart=/usr/bin/java -jar /opt/petclinic-rest/petclinic-rest.jar --spring.profiles.active=postgres,spring-data-jpa --server.port={{ petclinic_rest_port }}
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          Environment=JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64

          [Install]
          WantedBy=multi-user.target
      notify: Restart PetClinic REST

    - name: Enable and start PetClinic REST service
      systemd:
        name: petclinic-rest
        daemon_reload: true
        enabled: true
        state: started

    - name: Allow PetClinic REST port through UFW
      ufw:
        rule: allow
        port: "{{ petclinic_rest_port }}"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart PetClinic REST
      systemd:
        name: petclinic-rest
        state: restarted
