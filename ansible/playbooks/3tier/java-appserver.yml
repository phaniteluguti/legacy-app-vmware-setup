---
# =============================================================================
# Java 3-Tier — App Server VM: Spring PetClinic REST API on Standalone Tomcat
# Connects to PostgreSQL on the database VM
# Standalone Tomcat deployment for Azure Migrate web app discovery
# =============================================================================
- name: Deploy Spring PetClinic REST on Standalone Tomcat (Java 3-Tier)
  hosts: java_appserver
  become: true
  vars_files:
    - ../../group_vars/all.yml
  vars:
    db_host: "{{ hostvars[groups['java_database'][0]]['ansible_host'] | default(groups['java_database'][0]) }}"
    petclinic_rest_port: 9966
    tomcat_version: "11.0.21"
    tomcat_major: "11"
    tomcat_install_dir: /opt/tomcat
    tomcat_user: tomcat

  tasks:
    # ---- Passwordless sudo ----
    - name: Grant passwordless sudo to {{ ansible_user }}
      copy:
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ ansible_user }}"
        mode: '0440'
        validate: 'visudo -cf %s'

    # ---- Base Packages & JDK ----
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name: [git, curl, wget, gnupg2, software-properties-common, ca-certificates, unzip]
        state: present

    - name: Install OpenJDK {{ java_version }}
      apt:
        name: "openjdk-{{ java_version }}-jdk"
        state: present

    - name: Set JAVA_HOME in /etc/environment
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: "JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64"

    # ---- Standalone Apache Tomcat Installation ----
    - name: Create tomcat system group
      group:
        name: "{{ tomcat_user }}"
        system: true

    - name: Create tomcat system user
      user:
        name: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        system: true
        create_home: false
        shell: /bin/false

    - name: Download Apache Tomcat {{ tomcat_version }}
      get_url:
        url: "https://archive.apache.org/dist/tomcat/tomcat-{{ tomcat_major }}/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"

    - name: Check current Tomcat version
      shell: |
        if [ -f "{{ tomcat_install_dir }}/RELEASE-NOTES" ]; then
          grep -oP 'Apache Tomcat Version \K[0-9.]+' "{{ tomcat_install_dir }}/RELEASE-NOTES" || echo "unknown"
        else
          echo "none"
        fi
      register: current_tomcat_version
      changed_when: false

    - name: Remove old Tomcat if version has changed
      file:
        path: "{{ tomcat_install_dir }}"
        state: absent
      when: current_tomcat_version.stdout != tomcat_version

    - name: Create Tomcat install directory
      file:
        path: "{{ tomcat_install_dir }}"
        state: directory
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"

    - name: Extract Tomcat
      unarchive:
        src: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "{{ tomcat_install_dir }}"
        remote_src: true
        extra_opts: ["--strip-components=1"]
        creates: "{{ tomcat_install_dir }}/bin/catalina.sh"

    - name: Set Tomcat directory ownership
      file:
        path: "{{ tomcat_install_dir }}"
        state: directory
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        recurse: true

    - name: Configure Tomcat port to {{ petclinic_rest_port }}
      replace:
        path: "{{ tomcat_install_dir }}/conf/server.xml"
        regexp: 'Connector port="(8080|{{ petclinic_rest_port }})"'
        replace: 'Connector port="{{ petclinic_rest_port }}"'

    - name: Remove default Tomcat webapps
      file:
        path: "{{ tomcat_install_dir }}/webapps/{{ item }}"
        state: absent
      loop: [ROOT, docs, examples, host-manager, manager]

    - name: Create setenv.sh for Spring profiles
      copy:
        dest: "{{ tomcat_install_dir }}/bin/setenv.sh"
        content: |
          #!/bin/sh
          export JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64
          export CATALINA_OPTS="-Dspring.profiles.active=postgresql,spring-data-jpa"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        mode: "0755"

    # ---- Clone & Configure PetClinic REST ----
    - name: Create app build directory
      file:
        path: /opt/petclinic-rest
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Set git safe.directory globally
      command: git config --global --add safe.directory '*'
      register: git_safe_dir
      changed_when: false
      failed_when: false

    - name: Clone spring-petclinic-rest repository
      git:
        repo: https://github.com/spring-petclinic/spring-petclinic-rest.git
        dest: /opt/petclinic-rest/repo
        version: main
        update: false

    - name: Fix repo ownership
      file:
        path: /opt/petclinic-rest/repo
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Configure PostgreSQL connection
      copy:
        dest: /opt/petclinic-rest/repo/src/main/resources/application-postgresql.properties
        content: |
          spring.datasource.url=jdbc:postgresql://{{ db_host }}:5432/{{ postgres_db }}
          spring.datasource.username={{ postgres_user }}
          spring.datasource.password={{ postgres_password }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.database=POSTGRESQL
          spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.generate-ddl=true
          spring.sql.init.continue-on-error=true
        owner: "{{ ansible_user }}"

    # ---- Convert to WAR packaging ----
    - name: Set WAR packaging in pom.xml
      lineinfile:
        path: /opt/petclinic-rest/repo/pom.xml
        insertafter: '<artifactId>spring-petclinic-rest</artifactId>'
        line: '    <packaging>war</packaging>'
        regexp: '<packaging>'

    - name: Add provided-scope Tomcat dependency
      blockinfile:
        path: /opt/petclinic-rest/repo/pom.xml
        insertafter: '<dependencies>'
        marker: "<!-- {mark} ANSIBLE MANAGED - Tomcat provided for WAR -->"
        block: |2
              <dependency>
                  <groupId>org.springframework.boot</groupId>
                  <artifactId>spring-boot-starter-tomcat</artifactId>
                  <scope>provided</scope>
              </dependency>

    - name: Detect application class package path
      shell: >
        find /opt/petclinic-rest/repo/src/main/java -name '*Application*.java' -type f
        | head -1 | sed 's|.*/src/main/java/||; s|/[^/]*$||'
      register: app_pkg_path
      changed_when: false

    - name: Detect application class name
      shell: >
        find /opt/petclinic-rest/repo/src/main/java -name '*Application*.java' -type f
        | head -1 | xargs basename | sed 's|\.java$||'
      register: app_class
      changed_when: false

    - name: Create ServletInitializer for WAR deployment
      copy:
        dest: "/opt/petclinic-rest/repo/src/main/java/{{ app_pkg_path.stdout }}/ServletInitializer.java"
        content: |
          package {{ app_pkg_path.stdout | replace('/', '.') }};

          import org.springframework.boot.builder.SpringApplicationBuilder;
          import org.springframework.boot.web.servlet.support.SpringBootServletInitializer;

          public class ServletInitializer extends SpringBootServletInitializer {
              @Override
              protected SpringApplicationBuilder configure(SpringApplicationBuilder application) {
                  return application.sources({{ app_class.stdout }}.class);
              }
          }
        owner: "{{ ansible_user }}"

    # ---- Build & Deploy WAR ----
    - name: Check if WAR already built
      find:
        paths: /opt/petclinic-rest/repo/target
        patterns: "*.war"
      register: existing_war

    - name: Build PetClinic REST as WAR (skip tests)
      shell: |
        cd /opt/petclinic-rest/repo
        sudo -u {{ ansible_user }} bash -c 'JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64 ./mvnw clean package -DskipTests -Djacoco.skip=true'
      args:
        executable: /bin/bash
      when: existing_war.files | length == 0

    - name: Find built WAR file
      find:
        paths: /opt/petclinic-rest/repo/target
        patterns: "*.war"
      register: war_files

    - name: Remove old ROOT.war deployment if present
      file:
        path: "{{ tomcat_install_dir }}/webapps/{{ item }}"
        state: absent
      loop:
        - ROOT.war
        - ROOT

    - name: Deploy WAR to Tomcat
      copy:
        src: "{{ war_files.files[0].path }}"
        dest: "{{ tomcat_install_dir }}/webapps/petclinic.war"
        remote_src: true
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
      when: war_files.files | length > 0
      notify: Restart Tomcat

    # ---- Tomcat systemd Service ----
    - name: Create Tomcat systemd service
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat Web Application Container
          After=network.target

          [Service]
          Type=forking
          User={{ tomcat_user }}
          Group={{ tomcat_user }}
          Environment=JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64
          Environment=CATALINA_HOME={{ tomcat_install_dir }}
          Environment=CATALINA_BASE={{ tomcat_install_dir }}
          Environment=CATALINA_PID={{ tomcat_install_dir }}/temp/catalina.pid
          ExecStart={{ tomcat_install_dir }}/bin/startup.sh
          ExecStop={{ tomcat_install_dir }}/bin/shutdown.sh
          RestartSec=10
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify: Restart Tomcat

    - name: Enable and start Tomcat service
      systemd:
        name: tomcat
        daemon_reload: true
        enabled: true
        state: started

    - name: Allow Tomcat port through UFW
      ufw:
        rule: allow
        port: "{{ petclinic_rest_port }}"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart Tomcat
      systemd:
        name: tomcat
        state: restarted
