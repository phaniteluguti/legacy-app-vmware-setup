---
# =============================================================================
# Windows Java 3-Tier — Frontend VM: IIS serving Angular SPA + reverse proxy
# Same Angular UI as Linux, proxies API to PetClinic REST on app-server VM
# =============================================================================
- name: Deploy IIS Frontend (Windows Java 3-Tier)
  hosts: win_java_frontend
  gather_facts: true
  become: false
  vars_files:
    - ../../group_vars/all.yml
  vars:
    app_host: "{{ hostvars[groups['win_java_appserver'][0]]['ansible_host'] | default(groups['win_java_appserver'][0]) }}"
    petclinic_rest_port: 9966
    angular_src: C:\Apps\petclinic-angular
    iis_site_path: C:\inetpub\PetClinicFrontend

  tasks:
    # --- IIS + modules ---
    - name: Install IIS with required features
      win_feature:
        name:
          - Web-Server
          - Web-Mgmt-Console
          - Web-Mgmt-Tools
        state: present
      register: iis_install

    - name: Reboot if IIS install requires it
      win_reboot:
      when: iis_install.reboot_required | default(false)

    - name: Install Chocolatey
      win_shell: |
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        }
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Install IIS URL Rewrite, ARR, Node.js and Git
      win_chocolatey:
        name: "{{ item }}"
        state: present
      loop:
        - urlrewrite
        - iis-arr
        - nodejs-lts
        - git

    - name: Enable ARR proxy globally
      win_shell: |
        & "$env:windir\system32\inetsrv\appcmd.exe" set config -section:system.webServer/proxy /enabled:"True" /commit:apphost
      register: arr_result
      changed_when: "'HRESULT' not in arr_result.stderr"
      ignore_errors: false

    - name: Set ARR preserveHostHeader to false
      win_shell: |
        & "$env:windir\system32\inetsrv\appcmd.exe" set config -section:system.webServer/proxy /preserveHostHeader:"False" /commit:apphost
      changed_when: false
      ignore_errors: true

    - name: Unlock httpErrors section so web.config can override
      win_shell: |
        & "$env:windir\system32\inetsrv\appcmd.exe" unlock config -section:system.webServer/httpErrors
      changed_when: false
      ignore_errors: true

    # --- Build Angular SPA (same as Linux) ---
    - name: Clone spring-petclinic-angular repository
      win_shell: |
        & "C:\Program Files\Git\bin\git.exe" clone https://github.com/spring-petclinic/spring-petclinic-angular.git {{ angular_src }}
      args:
        creates: '{{ angular_src }}\package.json'

    - name: Refresh environment PATH (pick up Node.js)
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        node --version
        npm --version
      register: node_check
      changed_when: false

    - name: Install npm dependencies
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Set-Location "{{ angular_src }}"
        npm install
      args:
        creates: '{{ angular_src }}\node_modules'
      timeout: 600

    - name: Build Angular app for production
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        $env:NODE_OPTIONS = "--max-old-space-size=2048"
        Set-Location "{{ angular_src }}"
        npx ng build --configuration production
      args:
        creates: '{{ angular_src }}\dist'
      timeout: 600

    - name: Find Angular dist output directory (where index.html lives)
      win_shell: |
        $distRoot = "{{ angular_src }}\dist"
        if (Test-Path "$distRoot\index.html") {
          Write-Output $distRoot
        } else {
          $indexFile = Get-ChildItem $distRoot -Recurse -Filter index.html -File | Select-Object -First 1
          if ($indexFile) {
            Write-Output $indexFile.DirectoryName
          } else {
            Write-Output $distRoot
          }
        }
      register: dist_dir_result
      changed_when: false

    - name: Set dist path fact
      set_fact:
        angular_dist: "{{ dist_dir_result.stdout | trim }}"

    # --- Deploy to IIS ---
    - name: Create IIS site directory
      win_file:
        path: '{{ iis_site_path }}'
        state: directory

    - name: Copy built Angular app to IIS site directory
      win_shell: |
        if (Test-Path "{{ iis_site_path }}\index.html") {
          Remove-Item "{{ iis_site_path }}\*" -Recurse -Force
        }
        Copy-Item "{{ angular_dist }}\*" "{{ iis_site_path }}\" -Recurse -Force
      register: copy_result
      changed_when: true

    - name: Create web.config for SPA routing and API proxy
      win_copy:
        dest: '{{ iis_site_path }}\web.config'
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration>
            <system.webServer>
              <httpErrors existingResponse="PassThrough" />
              <rewrite>
                <rules>
                  <rule name="Proxy to PetClinic API" stopProcessing="true">
                    <match url="^petclinic/api/(.*)" />
                    <action type="Rewrite" url="http://{{ app_host }}:{{ petclinic_rest_port }}/petclinic/api/{R:1}" />
                  </rule>
                  <rule name="Angular SPA fallback" stopProcessing="true">
                    <match url=".*" />
                    <conditions logicalGrouping="MatchAll">
                      <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="true" />
                      <add input="{REQUEST_FILENAME}" matchType="IsDirectory" negate="true" />
                    </conditions>
                    <action type="Rewrite" url="/index.html" />
                  </rule>
                </rules>
              </rewrite>
            </system.webServer>
          </configuration>

    - name: Remove default IIS website
      win_iis_website:
        name: "Default Web Site"
        state: absent

    - name: Create IIS application pool (No Managed Code)
      win_iis_webapppool:
        name: PetClinicFrontendPool
        state: started
        attributes:
          managedRuntimeVersion: ''
          managedPipelineMode: 'Integrated'

    - name: Create IIS website
      win_iis_website:
        name: PetClinicFrontend
        state: started
        port: 80
        physical_path: '{{ iis_site_path }}'
        application_pool: PetClinicFrontendPool

    - name: Allow HTTP through Windows Firewall
      win_firewall_rule:
        name: "HTTP Inbound"
        localport: 80
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Reset IIS to apply changes
      win_shell: iisreset /restart
      changed_when: false

    # --- Verification ---
    - name: Smoke-test local Angular SPA via IIS
      win_uri:
        url: http://localhost/
        return_content: false
        status_code: 200
      register: local_check
      retries: 3
      delay: 5
      until: local_check.status_code == 200
      ignore_errors: true

    - name: Dump IIS error details if smoke-test failed
      win_shell: |
        Write-Output "=== IIS Sites ==="
        & "$env:windir\system32\inetsrv\appcmd.exe" list site
        Write-Output ""
        Write-Output "=== App Pools ==="
        & "$env:windir\system32\inetsrv\appcmd.exe" list apppool
        Write-Output ""
        Write-Output "=== Last 20 lines of IIS error log ==="
        $logDir = "$env:SystemDrive\inetpub\logs\LogFiles"
        $latestLog = Get-ChildItem $logDir -Recurse -Filter *.log -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($latestLog) { Get-Content $latestLog.FullName -Tail 20 } else { Write-Output '(no IIS log found)' }
      register: iis_diag
      when: local_check is failed

    - name: Display IIS diagnostics
      debug:
        var: iis_diag.stdout_lines
      when: local_check is defined and local_check is failed

    - name: Verify API backend is reachable from frontend
      win_uri:
        url: "http://{{ app_host }}:{{ petclinic_rest_port }}/petclinic/api/vets"
        return_content: false
        status_code: 200
      register: api_check
      retries: 10
      delay: 15
      until: api_check.status_code == 200
      ignore_errors: true

    - name: Warn if API backend is not reachable
      debug:
        msg: "WARNING — PetClinic REST API at {{ app_host }}:{{ petclinic_rest_port }} is not responding."
      when: api_check is failed

    # --- Standard services ---
    - name: Ensure WinRM service is running
      win_service:
        name: WinRM
        start_mode: auto
        state: started

    - name: Enable RDP
      win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    - name: Allow RDP through firewall
      win_firewall_rule:
        name: "Remote Desktop"
        localport: 3389
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true
