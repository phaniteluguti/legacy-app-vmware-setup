---
# =============================================================================
# Java VM — Spring PetClinic REST on Standalone Tomcat + PostgreSQL
# Same deployment strategy as 3-tier (external Tomcat + WAR) on a single VM
# =============================================================================
- name: Deploy PetClinic REST on Standalone Tomcat + PostgreSQL (1-Tier)
  hosts: java_servers
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    db_host: localhost
    petclinic_rest_port: 9966
    tomcat_version: "10.1.28"
    tomcat_major: "10"
    tomcat_install_dir: /opt/tomcat
    tomcat_user: tomcat

  tasks:
    # ---- Passwordless sudo ----
    - name: Grant passwordless sudo to {{ ansible_user }}
      copy:
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ ansible_user }}"
        mode: '0440'
        validate: 'visudo -cf %s'

    # ---------------------------------------------------------------
    # System updates & base packages
    # ---------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name: [git, curl, wget, gnupg2, software-properties-common, ca-certificates, unzip]
        state: present

    # ---------------------------------------------------------------
    # Java JDK
    # ---------------------------------------------------------------
    - name: Install OpenJDK {{ java_version }}
      apt:
        name: "openjdk-{{ java_version }}-jdk"
        state: present

    - name: Set JAVA_HOME in /etc/environment
      lineinfile:
        path: /etc/environment
        regexp: '^JAVA_HOME='
        line: "JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64"

    # ---------------------------------------------------------------
    # PostgreSQL (local — same VM)
    # ---------------------------------------------------------------
    - name: Add PostgreSQL APT key
      ansible.builtin.apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Add PostgreSQL APT repository
      ansible.builtin.apt_repository:
        repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        state: present

    - name: Install PostgreSQL {{ postgres_version }}
      apt:
        name:
          - "postgresql-{{ postgres_version }}"
          - "postgresql-client-{{ postgres_version }}"
          - python3-psycopg2
        state: present
        update_cache: true

    - name: Ensure PostgreSQL is started and enabled
      systemd:
        name: postgresql
        state: started
        enabled: true

    - name: Wait for PostgreSQL to accept connections
      wait_for:
        path: /var/run/postgresql/.s.PGSQL.5432
        state: present
        timeout: 30

    - name: Create PetClinic database
      shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ postgres_db }}'" | grep -q 1 || \
        sudo -u postgres createdb "{{ postgres_db }}"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create PetClinic database user
      shell: |
        sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ postgres_user }}'" | grep -q 1 || \
        sudo -u postgres psql -c "CREATE USER {{ postgres_user }} WITH PASSWORD '{{ postgres_password }}';"
        sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ postgres_db }} TO {{ postgres_user }};"
        sudo -u postgres psql -d {{ postgres_db }} -c "GRANT ALL ON SCHEMA public TO {{ postgres_user }};"
      args:
        executable: /bin/bash
      changed_when: false

    - name: Allow local password auth for petclinic user
      lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        insertbefore: '^local\s+all\s+all'
        line: "local   {{ postgres_db }}   {{ postgres_user }}   md5"
      notify: Restart PostgreSQL

    - name: Allow TCP connections from localhost
      lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
        insertafter: '^# IPv4 local connections'
        line: "host    {{ postgres_db }}   {{ postgres_user }}   127.0.0.1/32   md5"
      notify: Restart PostgreSQL

    - name: Apply PostgreSQL config changes before app deployment
      meta: flush_handlers

    # ---------------------------------------------------------------
    # Standalone Apache Tomcat
    # ---------------------------------------------------------------
    - name: Create tomcat system group
      group:
        name: "{{ tomcat_user }}"
        system: true

    - name: Create tomcat system user
      user:
        name: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        system: true
        create_home: false
        shell: /bin/false

    - name: Download Apache Tomcat {{ tomcat_version }}
      get_url:
        url: "https://archive.apache.org/dist/tomcat/tomcat-{{ tomcat_major }}/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"

    - name: Check current Tomcat version
      shell: |
        if [ -f "{{ tomcat_install_dir }}/RELEASE-NOTES" ]; then
          grep -oP 'Apache Tomcat Version \K[0-9.]+' "{{ tomcat_install_dir }}/RELEASE-NOTES" || echo "unknown"
        else
          echo "none"
        fi
      register: current_tomcat_version
      changed_when: false

    - name: Remove old Tomcat if version has changed
      file:
        path: "{{ tomcat_install_dir }}"
        state: absent
      when: current_tomcat_version.stdout != tomcat_version

    - name: Create Tomcat install directory
      file:
        path: "{{ tomcat_install_dir }}"
        state: directory
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"

    - name: Extract Tomcat
      unarchive:
        src: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "{{ tomcat_install_dir }}"
        remote_src: true
        extra_opts: ["--strip-components=1"]
        creates: "{{ tomcat_install_dir }}/bin/catalina.sh"

    - name: Set Tomcat directory ownership
      file:
        path: "{{ tomcat_install_dir }}"
        state: directory
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        recurse: true

    - name: Configure Tomcat port to {{ petclinic_rest_port }}
      replace:
        path: "{{ tomcat_install_dir }}/conf/server.xml"
        regexp: 'Connector port="(8080|{{ petclinic_rest_port }})"'
        replace: 'Connector port="{{ petclinic_rest_port }}"'

    - name: Remove default Tomcat webapps
      file:
        path: "{{ tomcat_install_dir }}/webapps/{{ item }}"
        state: absent
      loop: [ROOT, docs, examples, host-manager, manager]

    - name: Create setenv.sh for Spring profiles
      copy:
        dest: "{{ tomcat_install_dir }}/bin/setenv.sh"
        content: |
          #!/bin/sh
          export JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64
          export CATALINA_OPTS="-Dspring.profiles.active=postgresql,spring-data-jpa"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        mode: "0755"

    # ---------------------------------------------------------------
    # Clone & Configure PetClinic REST
    # ---------------------------------------------------------------
    - name: Create app build directory
      file:
        path: /opt/petclinic-rest
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Set git safe.directory globally
      command: git config --global --add safe.directory '*'
      changed_when: false
      failed_when: false

    - name: Check current petclinic-rest version
      command: git -C /opt/petclinic-rest/repo describe --tags --exact-match HEAD
      register: current_petclinic_tag
      changed_when: false
      failed_when: false

    - name: Remove stale petclinic-rest clone (wrong version)
      file:
        path: /opt/petclinic-rest/repo
        state: absent
      when: current_petclinic_tag.stdout | default('') != 'v3.4.0'

    - name: Clone spring-petclinic-rest repository
      git:
        repo: https://github.com/spring-petclinic/spring-petclinic-rest.git
        dest: /opt/petclinic-rest/repo
        version: v3.4.0
        update: false

    - name: Fix repo ownership
      file:
        path: /opt/petclinic-rest/repo
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Configure PostgreSQL connection
      copy:
        dest: /opt/petclinic-rest/repo/src/main/resources/application-postgresql.properties
        content: |
          spring.sql.init.platform=postgres
          spring.datasource.url=jdbc:postgresql://{{ db_host }}:5432/{{ postgres_db }}
          spring.datasource.username={{ postgres_user }}
          spring.datasource.password={{ postgres_password }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          spring.jpa.database=POSTGRESQL
          spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.generate-ddl=true
          spring.sql.init.continue-on-error=true
        owner: "{{ ansible_user }}"
      register: pg_props

    - name: Remove target to force rebuild when properties changed
      file:
        path: /opt/petclinic-rest/repo/target
        state: absent
      when: pg_props is changed

    # ---- Convert to WAR packaging ----
    - name: Set WAR packaging in pom.xml
      lineinfile:
        path: /opt/petclinic-rest/repo/pom.xml
        insertafter: '<artifactId>spring-petclinic-rest</artifactId>'
        line: '    <packaging>war</packaging>'
        regexp: '<packaging>'

    - name: Add provided-scope Tomcat dependency
      blockinfile:
        path: /opt/petclinic-rest/repo/pom.xml
        insertafter: '<dependencies>'
        marker: "<!-- {mark} ANSIBLE MANAGED - Tomcat provided for WAR -->"
        block: |2
              <dependency>
                  <groupId>org.springframework.boot</groupId>
                  <artifactId>spring-boot-starter-tomcat</artifactId>
                  <scope>provided</scope>
              </dependency>

    # PetClinicApplication already extends SpringBootServletInitializer — no extra
    # ServletInitializer needed. Remove any stale one from prior runs.
    - name: Remove stale ServletInitializer from prior runs
      shell: find /opt/petclinic-rest/repo/src -name 'ServletInitializer.java' -print -delete
      register: removed_si
      changed_when: removed_si.stdout | trim | length > 0
      failed_when: false

    - name: Force WAR rebuild if stale ServletInitializer was removed
      file:
        path: /opt/petclinic-rest/repo/target
        state: absent
      when: removed_si is changed

    # ---- Build & Deploy WAR ----
    - name: Check if WAR already built
      find:
        paths: /opt/petclinic-rest/repo/target
        patterns: "*.war"
      register: existing_war

    - name: Build PetClinic REST as WAR (skip tests)
      shell: |
        cd /opt/petclinic-rest/repo
        sudo -u {{ ansible_user }} bash -c 'JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64 ./mvnw clean package -DskipTests -Djacoco.skip=true'
      args:
        executable: /bin/bash
      when: existing_war.files | length == 0

    - name: Find built WAR file
      find:
        paths: /opt/petclinic-rest/repo/target
        patterns: "*.war"
      register: war_files

    - name: Remove old ROOT.war deployment if present
      file:
        path: "{{ tomcat_install_dir }}/webapps/{{ item }}"
        state: absent
      loop:
        - ROOT.war
        - ROOT

    - name: Deploy WAR to Tomcat
      copy:
        src: "{{ war_files.files[0].path }}"
        dest: "{{ tomcat_install_dir }}/webapps/petclinic.war"
        remote_src: true
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
      when: war_files.files | length > 0
      notify: Restart Tomcat

    # ---------------------------------------------------------------
    # Tomcat systemd service
    # ---------------------------------------------------------------
    - name: Create Tomcat systemd service
      copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Unit]
          Description=Apache Tomcat Web Application Container
          After=network.target postgresql.service
          Requires=postgresql.service

          [Service]
          Type=forking
          User={{ tomcat_user }}
          Group={{ tomcat_user }}
          Environment=JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64
          Environment=CATALINA_HOME={{ tomcat_install_dir }}
          Environment=CATALINA_BASE={{ tomcat_install_dir }}
          Environment=CATALINA_PID={{ tomcat_install_dir }}/temp/catalina.pid
          ExecStart={{ tomcat_install_dir }}/bin/startup.sh
          ExecStop={{ tomcat_install_dir }}/bin/shutdown.sh
          RestartSec=10
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify: Restart Tomcat

    - name: Enable and start Tomcat service
      systemd:
        name: tomcat
        daemon_reload: true
        enabled: true
        state: started

    # ---------------------------------------------------------------
    # Angular SPA Frontend (same as 3-tier java-frontend)
    # ---------------------------------------------------------------
    - name: Install Node.js 18.x repository
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list
        executable: /bin/bash

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: true

    - name: Clone spring-petclinic-angular repository
      git:
        repo: https://github.com/spring-petclinic/spring-petclinic-angular.git
        dest: /opt/petclinic-angular
        version: master
        update: false

    - name: Install npm dependencies
      shell: npm install
      args:
        chdir: /opt/petclinic-angular
        creates: /opt/petclinic-angular/node_modules

    - name: Patch Angular environment to use Nginx reverse proxy for API
      shell: |
        # Change REST_API_URL from http://localhost:9966/petclinic/api/ to relative /petclinic/api/
        grep -rl 'http://localhost:9966/petclinic/api/' /opt/petclinic-angular/src/environments/ && \
          find /opt/petclinic-angular/src -name 'environment*.ts' -exec \
            sed -i "s|http://localhost:9966/petclinic/api/|/petclinic/api/|g" {} + && \
          rm -rf /opt/petclinic-angular/dist
      args:
        chdir: /opt/petclinic-angular
      register: patch_result
      changed_when: patch_result.rc == 0
      failed_when: false

    - name: Build Angular app for production
      shell: npx ng build --configuration production
      args:
        chdir: /opt/petclinic-angular
        creates: /opt/petclinic-angular/dist
      environment:
        NODE_OPTIONS: "--max-old-space-size=2048"

    - name: Find Angular dist output directory (where index.html lives)
      shell: |
        # Angular may output to dist/ directly, dist/<project>/, or dist/<project>/browser/
        if [ -f /opt/petclinic-angular/dist/index.html ]; then
          echo /opt/petclinic-angular/dist
        else
          find /opt/petclinic-angular/dist -name index.html -type f -print -quit | xargs dirname
        fi
      register: dist_dir_result
      changed_when: false

    - name: Set dist path fact
      set_fact:
        angular_dist: "{{ dist_dir_result.stdout | trim }}"

    - name: Copy built Angular app to Nginx web root
      shell: cp -a {{ angular_dist }}/. /var/www/petclinic/
      args:
        creates: /var/www/petclinic/index.html

    - name: Set Nginx web root ownership
      file:
        path: /var/www/petclinic
        state: directory
        owner: www-data
        group: www-data
        recurse: true

    # ---------------------------------------------------------------
    # Nginx — Angular SPA + API reverse proxy (port 80)
    # ---------------------------------------------------------------
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Configure Nginx for Angular SPA with API proxy
      copy:
        dest: /etc/nginx/sites-available/petclinic
        content: |
          server {
              listen 80;
              server_name _;
              root /var/www/petclinic;
              index index.html;

              # Angular SPA — serve index.html for all routes
              location / {
                  try_files $uri $uri/ /index.html;
              }

              # Proxy API requests to the local Tomcat
              location /petclinic/api/ {
                  proxy_pass http://127.0.0.1:{{ petclinic_rest_port }}/petclinic/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      notify: Restart Nginx

    - name: Enable petclinic Nginx site
      file:
        src: /etc/nginx/sites-available/petclinic
        dest: /etc/nginx/sites-enabled/petclinic
        state: link
      notify: Restart Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart Nginx

    - name: Ensure Nginx is started and enabled
      systemd:
        name: nginx
        state: started
        enabled: true

    # ---------------------------------------------------------------
    # Firewall
    # ---------------------------------------------------------------
    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      ignore_errors: true

    - name: Allow Tomcat port through UFW
      ufw:
        rule: allow
        port: "{{ petclinic_rest_port }}"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart PostgreSQL
      systemd:
        name: postgresql
        state: restarted

    - name: Restart Tomcat
      systemd:
        name: tomcat
        state: restarted

    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
