---
# =============================================================================
# DNS Registration — Windows VMs
# Registers all Windows VMs (single-VM + 3-tier) as A records in a
# Windows DNS Server (AD-integrated).
#
# Delegates the Add-DnsServerResourceRecordA call directly to the DNS
# server via WinRM, avoiding double-hop Invoke-Command issues.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/dns-register-windows.yml \
#     -e "dns_server=10.20.1.4" -e "dns_zone=azurecmf.org" \
#     -e "dns_admin_user=Administrator" -e "dns_admin_password=SECRET" -v
# =============================================================================

# Play 1: Gather facts from Windows VMs and add DNS server as delegate
- name: Gather Windows VM info for DNS registration
  hosts: win_servers:win_servers_3tier
  gather_facts: true
  become: false

  tasks:
    - name: Validate DNS variables are set
      assert:
        that:
          - dns_server is defined and dns_server | length > 0
          - dns_zone is defined and dns_zone | length > 0
          - dns_admin_user is defined and dns_admin_user | length > 0
          - dns_admin_password is defined and dns_admin_password | length > 0
        fail_msg: "dns_server, dns_zone, dns_admin_user, and dns_admin_password must be provided"

    - name: Add DNS server as a WinRM delegate host
      add_host:
        name: dns_delegate
        ansible_host: "{{ dns_server }}"
        ansible_connection: winrm
        ansible_winrm_transport: ntlm
        ansible_winrm_scheme: http
        ansible_port: 5985
        ansible_user: "{{ dns_admin_user }}"
        ansible_password: "{{ dns_admin_password }}"
      run_once: true
      no_log: true

    - name: Collect VM registration info
      set_fact:
        dns_record:
          hostname: "{{ ansible_hostname | lower }}"
          ip: "{{ ansible_host }}"

# Play 2: Register each Windows VM on the DNS server
- name: Register Windows VMs in DNS
  hosts: win_servers:win_servers_3tier
  gather_facts: false
  serial: 1

  tasks:
    - name: Register A record on DNS server
      win_shell: |
        $zone = "{{ dns_zone }}"
        $name = "{{ dns_record.hostname }}"
        $ip   = "{{ dns_record.ip }}"

        # Remove existing record if any
        $existing = Get-DnsServerResourceRecord -ZoneName $zone -Name $name -RRType A -ErrorAction SilentlyContinue
        if ($existing) {
          Remove-DnsServerResourceRecord -ZoneName $zone -Name $name -RRType A -Force -ErrorAction Stop
        }

        # Add new A record
        Add-DnsServerResourceRecordA -ZoneName $zone -Name $name -IPv4Address $ip -TimeToLive 01:00:00 -ErrorAction Stop
        Write-Host "Registered $name.$zone -> $ip"
      delegate_to: dns_delegate
      register: dns_result

    - name: Verify DNS registration
      win_shell: |
        nslookup {{ dns_record.hostname }}.{{ dns_zone }} {{ dns_server }}
      register: nslookup_result
      changed_when: false
      failed_when: false

    - name: Show registration result
      debug:
        msg: >-
          {{ dns_record.hostname }}.{{ dns_zone }} -> {{ dns_record.ip }}:
          {{ 'OK' if dns_record.ip in (nslookup_result.stdout | default(''))
             else 'FAILED - ' + (dns_result.stderr | default('unknown error')) }}
