---
# =============================================================================
# Windows .NET VM — eShopOnWeb ASP.NET Core 8 + SQL Server 2019 Express
# Same eShopOnWeb app as 3-tier, running on a single VM with local SQL Server
# Kestrel via NSSM service (same deployment as 3-tier app server)
# =============================================================================
- name: Deploy eShopOnWeb + SQL Server on Windows (1-Tier)
  hosts: win_dotnet_servers
  gather_facts: true
  become: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    eshop_src: C:\Apps\eShopOnWeb
    eshop_published: C:\Apps\eShopOnWeb\published
    eshop_logs: C:\Apps\eShopOnWeb\logs

  tasks:
    # ---------------------------------------------------------------
    # SQL Server 2019 Express (silent install)
    # ---------------------------------------------------------------
    - name: Check if SQL Server is already installed
      win_service:
        name: MSSQLSERVER
      register: mssql_svc
      ignore_errors: true

    - name: Create SQL Server installer directory
      win_file:
        path: C:\SQLInstall
        state: directory
      when: mssql_svc.state is not defined or mssql_svc.state != 'running'

    - name: Download SQL Server 2019 Express installer
      win_get_url:
        url: https://go.microsoft.com/fwlink/?linkid=866658
        dest: C:\SQLInstall\SQL2019-SSEI-Expr.exe
      when: mssql_svc.state is not defined or mssql_svc.state != 'running'

    - name: Download SQL Server media
      win_command: >
        C:\SQLInstall\SQL2019-SSEI-Expr.exe /Action=Download
        /MediaPath=C:\SQLInstall /MediaType=Core /Quiet
      args:
        creates: C:\SQLInstall\SQLEXPR_x64_ENU.exe
      when: mssql_svc.state is not defined or mssql_svc.state != 'running'

    - name: Extract SQL Server media
      win_command: >
        C:\SQLInstall\SQLEXPR_x64_ENU.exe /x:C:\SQLInstall\extracted /Q
      args:
        creates: C:\SQLInstall\extracted\setup.exe
      when: mssql_svc.state is not defined or mssql_svc.state != 'running'

    - name: Install SQL Server 2019 Express
      win_command: >
        C:\SQLInstall\extracted\setup.exe /Q /IACCEPTSQLSERVERLICENSETERMS
        /ACTION=Install /FEATURES=SQLENGINE
        /INSTANCENAME=MSSQLSERVER
        /SECURITYMODE=SQL
        /SAPWD="{{ mssql_sa_password }}"
        /SQLSVCACCOUNT="NT AUTHORITY\SYSTEM"
        /TCPENABLED=1
        /UpdateEnabled=False
      args:
        creates: C:\Program Files\Microsoft SQL Server\MSSQL15.MSSQLSERVER
      when: mssql_svc.state is not defined or mssql_svc.state != 'running'
      register: sql_install

    - name: Reboot after SQL Server install
      win_reboot:
      when: sql_install is changed

    - name: Ensure SQL Server service is running
      win_service:
        name: MSSQLSERVER
        start_mode: auto
        state: started

    - name: Ensure SQL Server Browser is running
      win_service:
        name: SQLBrowser
        start_mode: auto
        state: started

    # ---------------------------------------------------------------
    # Wait for SQL Server readiness + TCP verification
    # ---------------------------------------------------------------
    - name: Wait for SQL Server to be ready
      win_command: >
        sqlcmd -S localhost -U SA -P "{{ mssql_sa_password }}"
        -Q "SELECT 1"
      register: sql_ready
      retries: 12
      delay: 10
      until: sql_ready.rc == 0
      changed_when: false

    - name: Ensure SQL Server TCP/IP protocol is enabled
      win_shell: |
        Import-Module SQLPS -DisableNameChecking -ErrorAction SilentlyContinue
        $wmi = New-Object Microsoft.SqlServer.Management.Smo.Wmi.ManagedComputer $env:COMPUTERNAME
        $tcp = $wmi.ServerInstances['MSSQLSERVER'].ServerProtocols['Tcp']
        if (-not $tcp.IsEnabled) {
          $tcp.IsEnabled = $true
          $tcp.Alter()
          Restart-Service MSSQLSERVER -Force
          Write-Output "TCP enabled and service restarted"
        } else {
          Write-Output "TCP already enabled"
        }
      register: tcp_result
      changed_when: "'restarted' in tcp_result.stdout"
      ignore_errors: true

    # ---------------------------------------------------------------
    # Create database
    # ---------------------------------------------------------------
    - name: Create application database
      win_command: >
        sqlcmd -S localhost -U SA -P "{{ mssql_sa_password }}"
        -Q "IF NOT EXISTS (SELECT * FROM sys.databases WHERE name='{{ mssql_db_name }}') CREATE DATABASE [{{ mssql_db_name }}]"
      changed_when: false

    # ---------------------------------------------------------------
    # Chocolatey + Dependencies
    # ---------------------------------------------------------------
    - name: Install Chocolatey
      win_shell: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
        Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    - name: Install Git and NSSM via Chocolatey
      win_chocolatey:
        name: "{{ item }}"
        state: present
      loop:
        - git
        - nssm

    - name: Install .NET 8 SDK
      win_chocolatey:
        name: dotnet-8.0-sdk
        state: present

    - name: Refresh environment PATH
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        dotnet --version
      register: dotnet_check
      changed_when: false

    # ---------------------------------------------------------------
    # eShopOnWeb Application (same as 3-tier app server)
    # ---------------------------------------------------------------
    - name: Create app directories
      win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - '{{ eshop_src }}'
        - '{{ eshop_logs }}'
        - '{{ eshop_src }}\temp'

    - name: Clone eShopOnWeb repository
      win_shell: >
        & "C:/Program Files/Git/bin/git.exe" clone
        https://github.com/dotnet-architecture/eShopOnWeb.git
        "{{ eshop_src }}/repo"
      args:
        creates: '{{ eshop_src }}\repo\eShopOnWeb.sln'

    - name: Write appsettings.json for eShopOnWeb
      win_copy:
        dest: '{{ eshop_src }}\repo\src\Web\appsettings.json'
        content: |
          {
            "baseUrls": {
              "apiBase": "http://0.0.0.0:{{ dotnet_app_port }}/api/",
              "webBase": "http://0.0.0.0:{{ dotnet_app_port }}/"
            },
            "ConnectionStrings": {
              "CatalogConnection": "Server=localhost;Database={{ mssql_db_name }};User Id=SA;Password={{ mssql_sa_password }};TrustServerCertificate=True;",
              "IdentityConnection": "Server=localhost;Database={{ mssql_db_name }};User Id=SA;Password={{ mssql_sa_password }};TrustServerCertificate=True;"
            },
            "CatalogBaseUrl": "",
            "Logging": {
              "LogLevel": {
                "Default": "Warning",
                "Microsoft": "Warning",
                "System": "Warning"
              }
            },
            "AllowedHosts": "*",
            "Kestrel": {
              "Endpoints": {
                "Http": {
                  "Url": "http://0.0.0.0:{{ dotnet_app_port }}"
                }
              }
            }
          }

    - name: Remove environment-specific appsettings overrides
      win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - '{{ eshop_src }}\repo\src\Web\appsettings.Docker.json'
        - '{{ eshop_src }}\repo\src\Web\appsettings.Development.json'

    - name: Build and publish eShopOnWeb
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Set-Location "{{ eshop_src }}/repo"
        dotnet publish src/Web/Web.csproj -c Release -o "{{ eshop_published }}"
      register: build_result
      timeout: 600

    - name: Verify published output exists
      win_stat:
        path: '{{ eshop_published }}\Web.dll'
      register: web_dll
      failed_when: not web_dll.stat.exists

    - name: Copy appsettings.json to published directory (runtime override)
      win_copy:
        src: '{{ eshop_src }}\repo\src\Web\appsettings.json'
        dest: '{{ eshop_published }}\appsettings.json'
        remote_src: true

    - name: Detect dotnet.exe full path
      win_shell: (Get-Command dotnet).Source
      register: dotnet_exe
      changed_when: false

    - name: Detect dotnet root directory
      win_shell: Split-Path "{{ dotnet_exe.stdout | trim }}"
      register: dotnet_root_dir
      changed_when: false

    # ---------------------------------------------------------------
    # Pre-flight test
    # ---------------------------------------------------------------
    - name: Pre-flight test — start eShopOnWeb briefly to check for startup crashes
      win_shell: |
        $env:ASPNETCORE_ENVIRONMENT = "Docker"
        $env:DOTNET_CLI_HOME = "{{ eshop_src }}\temp"
        $env:DOTNET_ROOT = "{{ dotnet_root_dir.stdout | trim }}"
        $proc = Start-Process -FilePath "{{ dotnet_exe.stdout | trim }}" -ArgumentList "{{ eshop_published }}\Web.dll" -WorkingDirectory "{{ eshop_published }}" -PassThru -RedirectStandardError "{{ eshop_logs }}\preflight-stderr.txt" -RedirectStandardOutput "{{ eshop_logs }}\preflight-stdout.txt"
        Start-Sleep -Seconds 15
        $listening = Test-NetConnection -ComputerName localhost -Port {{ dotnet_app_port }} -WarningAction SilentlyContinue
        $hasExited = $proc.HasExited
        $exitCode = $proc.ExitCode
        Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
        Write-Output "TCP_TEST: $($listening.TcpTestSucceeded)"
        Write-Output "PROCESS_EXITED: $hasExited"
        Write-Output "EXIT_CODE: $exitCode"
        Write-Output "=== STDERR ==="
        Get-Content "{{ eshop_logs }}\preflight-stderr.txt" -ErrorAction SilentlyContinue
        Write-Output "=== STDOUT ==="
        Get-Content "{{ eshop_logs }}\preflight-stdout.txt" -ErrorAction SilentlyContinue
      register: preflight
      timeout: 60
      ignore_errors: true

    - name: Show pre-flight result
      debug:
        msg: "{{ preflight.stdout_lines }}"

    - name: Fail if pre-flight test shows app is not starting
      fail:
        msg: "eShopOnWeb failed pre-flight test - see output above for crash details"
      when: >
        preflight.rc is defined and
        preflight.rc != 0 and
        'TCP_TEST: True' not in (preflight.stdout | default(''))

    # ---------------------------------------------------------------
    # NSSM Windows Service (same as 3-tier)
    # ---------------------------------------------------------------
    - name: Stop existing eShopOnWeb service if running
      win_shell: nssm stop eShopOnWeb
      ignore_errors: true
      changed_when: false

    - name: Remove existing NSSM service for clean reinstall
      win_shell: nssm remove eShopOnWeb confirm
      ignore_errors: true
      changed_when: false

    - name: Install eShopOnWeb as Windows service via NSSM
      win_shell: >
        nssm install eShopOnWeb "{{ dotnet_exe.stdout | trim }}"
        "{{ eshop_published }}\Web.dll"

    - name: Configure NSSM service parameters
      win_shell: |
        nssm set eShopOnWeb AppDirectory "{{ eshop_published }}"
        nssm set eShopOnWeb AppEnvironmentExtra "ASPNETCORE_ENVIRONMENT=Docker" "DOTNET_CLI_HOME={{ eshop_src }}\temp" "DOTNET_ROOT={{ dotnet_root_dir.stdout | trim }}"
        nssm set eShopOnWeb AppStdout "{{ eshop_logs }}\stdout.log"
        nssm set eShopOnWeb AppStderr "{{ eshop_logs }}\stderr.log"
        nssm set eShopOnWeb AppStdoutCreationDisposition 4
        nssm set eShopOnWeb AppStderrCreationDisposition 4
        nssm set eShopOnWeb AppRotateFiles 1
        nssm set eShopOnWeb AppRotateBytes 10485760
      changed_when: false

    - name: Start eShopOnWeb service
      win_service:
        name: eShopOnWeb
        start_mode: auto
        state: started

    - name: Wait for eShopOnWeb to start responding
      win_uri:
        url: "http://localhost:{{ dotnet_app_port }}/"
        return_content: false
        status_code: [200, 302]
      register: eshop_check
      retries: 18
      delay: 10
      until: eshop_check.status_code is defined and eshop_check.status_code in [200, 302]
      ignore_errors: true

    - name: Show eShopOnWeb startup status
      debug:
        msg: "eShopOnWeb is {{ 'running' if eshop_check is succeeded else 'NOT responding — check logs at ' + eshop_logs }}"

    - name: Show NSSM service status if failed
      win_shell: nssm status eShopOnWeb
      register: nssm_status
      changed_when: false
      when: eshop_check is failed

    - name: Show NSSM stderr log if service failed to start
      win_shell: >
        Get-Content "{{ eshop_logs }}\stderr.log" -Tail 50 -ErrorAction SilentlyContinue
      register: stderr_log
      changed_when: false
      when: eshop_check is failed

    - name: Show NSSM stdout log if service failed to start
      win_shell: >
        Get-Content "{{ eshop_logs }}\stdout.log" -Tail 50 -ErrorAction SilentlyContinue
      register: stdout_log
      changed_when: false
      when: eshop_check is failed

    - name: Display diagnostic logs
      debug:
        msg:
          - "NSSM status: {{ nssm_status.stdout | default('unknown') }}"
          - "=== STDERR (last 50 lines) ==="
          - "{{ stderr_log.stdout_lines | default(['(empty)']) }}"
          - "=== STDOUT (last 50 lines) ==="
          - "{{ stdout_log.stdout_lines | default(['(empty)']) }}"
      when: eshop_check is failed

    # ---------------------------------------------------------------
    # Firewall
    # ---------------------------------------------------------------
    - name: Allow app port through Windows Firewall
      win_firewall_rule:
        name: "eShopOnWeb HTTP"
        localport: "{{ dotnet_app_port }}"
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Allow SQL Server (port 1433) through Windows Firewall
      win_firewall_rule:
        name: "SQL Server Inbound"
        localport: 1433
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    # ---------------------------------------------------------------
    # WinRM + RDP — keep available for Azure Migrate
    # ---------------------------------------------------------------
    - name: Ensure WinRM service is running
      win_service:
        name: WinRM
        start_mode: auto
        state: started

    - name: Enable RDP for Azure Migrate
      win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    - name: Allow RDP through firewall
      win_firewall_rule:
        name: "Remote Desktop"
        localport: 3389
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true
