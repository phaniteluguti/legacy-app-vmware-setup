---
# =============================================================================
# Windows PHP VM — Laravel via artisan serve (NSSM) + IIS reverse proxy + MySQL
# Same deployment strategy as 3-tier (artisan serve + IIS proxy) on a single VM
# =============================================================================
- name: Deploy PHP Laravel + MySQL on Windows (1-Tier)
  hosts: win_php_servers
  gather_facts: true
  become: false
  vars_files:
    - ../group_vars/all.yml
  vars:
    laravel_port: 8000
    laravel_app: C:\Apps\LaravelApp
    laravel_logs: C:\Apps\LaravelApp\logs

  tasks:
    # ---------------------------------------------------------------
    # WinRM memory limit (composer install produces large output)
    # ---------------------------------------------------------------
    - name: Increase WinRM shell memory to 1GB
      win_shell: |
        Set-Item WSMan:\localhost\Shell\MaxMemoryPerShellMB 1024
        Set-Item WSMan:\localhost\Plugin\microsoft.powershell\Quotas\MaxMemoryPerShellMB 1024
      changed_when: false
      ignore_errors: true

    # ---------------------------------------------------------------
    # Chocolatey (package manager)
    # ---------------------------------------------------------------
    - name: Install Chocolatey
      win_shell: |
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        }
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    # ---------------------------------------------------------------
    # IIS (reverse proxy only — same as 3-tier frontend)
    # ---------------------------------------------------------------
    - name: Install IIS with required features
      win_feature:
        name:
          - Web-Server
          - Web-Mgmt-Console
          - Web-Mgmt-Tools
        state: present
      register: iis_install

    - name: Reboot if IIS install requires it
      win_reboot:
      when: iis_install.reboot_required | default(false)

    - name: Install IIS URL Rewrite and ARR modules
      win_chocolatey:
        name: "{{ item }}"
        state: present
      loop:
        - urlrewrite
        - iis-arr

    - name: Enable ARR proxy globally
      win_shell: >
        & "$env:windir\system32\inetsrv\appcmd.exe" set config
        -section:system.webServer/proxy /enabled:"True" /commit:apphost
      changed_when: false
      ignore_errors: true

    - name: Unlock httpErrors section
      win_shell: >
        & "$env:windir\system32\inetsrv\appcmd.exe" unlock config
        -section:system.webServer/httpErrors
      changed_when: false
      ignore_errors: true

    # ---------------------------------------------------------------
    # Git, PHP, Composer & NSSM
    # ---------------------------------------------------------------
    - name: Install Git, PHP, Composer, and NSSM via Chocolatey
      win_chocolatey:
        name: "{{ item }}"
        state: present
      loop:
        - git
        - php
        - composer
        - nssm

    - name: Refresh environment PATH
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        php --version
        composer --version
      register: php_check
      changed_when: false

    - name: Detect PHP install path
      win_shell: |
        $phpExe = (Get-Command php -ErrorAction SilentlyContinue).Source
        if ($phpExe) { Write-Output (Split-Path $phpExe) }
        elseif (Test-Path "C:/PHP/php.exe") { Write-Output "C:/PHP" }
        else { Get-ChildItem "C:/tools" -Directory -Filter "php*" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName }
      register: php_detect
      changed_when: false

    - name: Set PHP path fact
      set_fact:
        php_path: "{{ php_detect.stdout | trim }}"

    - name: Create php.ini from template if missing
      win_shell: |
        $ini = "{{ php_path }}/php.ini"
        $dev = "{{ php_path }}/php.ini-development"
        $prod = "{{ php_path }}/php.ini-production"
        if (!(Test-Path $ini)) {
          if (Test-Path $dev) { Copy-Item $dev $ini }
          elseif (Test-Path $prod) { Copy-Item $prod $ini }
        }
      args:
        creates: '{{ php_path }}\php.ini'

    - name: Enable required PHP extensions
      win_lineinfile:
        path: '{{ php_path }}\php.ini'
        regexp: "^;?extension={{ item }}"
        line: "extension={{ item }}"
      loop:
        - curl
        - fileinfo
        - mbstring
        - openssl
        - pdo_mysql
        - mysqli

    # ---------------------------------------------------------------
    # MySQL
    # ---------------------------------------------------------------
    - name: Install MySQL via Chocolatey
      win_chocolatey:
        name: mysql
        state: present

    - name: Ensure MySQL service is running
      win_service:
        name: MySQL
        start_mode: auto
        state: started

    - name: Wait for MySQL to be ready
      win_wait_for:
        port: 3306
        timeout: 60

    - name: Set MySQL root password and create app database
      win_shell: |
        $mysqlBin = (Get-Command mysql -ErrorAction SilentlyContinue).Source
        if (!$mysqlBin) { $mysqlBin = "C:\tools\mysql\current\bin\mysql.exe" }
        # Try setting root password (may already be set)
        & $mysqlBin -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}';" 2>$null
        # Create database and user
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "CREATE DATABASE IF NOT EXISTS {{ mysql_db_name }};"
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "CREATE USER IF NOT EXISTS '{{ mysql_db_user }}'@'localhost' IDENTIFIED BY '{{ mysql_db_password }}';"
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "GRANT ALL PRIVILEGES ON {{ mysql_db_name }}.* TO '{{ mysql_db_user }}'@'localhost'; FLUSH PRIVILEGES;"
      changed_when: false

    # ---------------------------------------------------------------
    # Clone & Setup Laravel (same as 3-tier app server)
    # ---------------------------------------------------------------
    - name: Create app directories
      win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - '{{ laravel_app }}'
        - '{{ laravel_logs }}'

    - name: Clone Laravel repository
      win_shell: >
        & "C:/Program Files/Git/bin/git.exe" clone
        --branch {{ php_app_branch }}
        {{ php_app_repo }}
        "{{ laravel_app }}/repo"
      args:
        creates: '{{ laravel_app }}\repo\composer.json'

    - name: Install Composer dependencies
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Set-Location "{{ laravel_app }}/repo"
        composer install --no-interaction --no-dev --optimize-autoloader
      args:
        creates: '{{ laravel_app }}\repo\vendor\autoload.php'
      environment:
        COMPOSER_HOME: C:\ProgramData\ComposerData
        COMPOSER_ALLOW_SUPERUSER: "1"
      timeout: 600

    - name: Copy .env file from example
      win_shell: >
        Copy-Item "{{ laravel_app }}/repo/.env.example"
        "{{ laravel_app }}/repo/.env"
      args:
        creates: '{{ laravel_app }}\repo\.env'

    - name: Configure Laravel .env for local MySQL
      win_lineinfile:
        path: '{{ laravel_app }}\repo\.env'
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: "DB_CONNECTION", value: "mysql" }
        - { key: "DB_HOST", value: "127.0.0.1" }
        - { key: "DB_PORT", value: "3306" }
        - { key: "DB_DATABASE", value: "{{ mysql_db_name }}" }
        - { key: "DB_USERNAME", value: "{{ mysql_db_user }}" }
        - { key: "DB_PASSWORD", value: "{{ mysql_db_password }}" }
        - { key: "APP_URL", value: "http://0.0.0.0:{{ laravel_port }}" }

    - name: Generate Laravel application key
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Set-Location "{{ laravel_app }}/repo"
        php artisan key:generate --force
      changed_when: false

    - name: Run Laravel migrations
      win_shell: |
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        Set-Location "{{ laravel_app }}/repo"
        php artisan migrate --force
      changed_when: false
      ignore_errors: true

    # ---------------------------------------------------------------
    # Laravel NSSM service (artisan serve — same as 3-tier app server)
    # ---------------------------------------------------------------
    - name: Stop existing Laravel service if running
      win_shell: nssm stop LaravelAPI
      ignore_errors: true
      changed_when: false

    - name: Remove existing NSSM service for clean reinstall
      win_shell: nssm remove LaravelAPI confirm
      ignore_errors: true
      changed_when: false

    - name: Detect PHP executable path
      win_shell: (Get-Command php).Source
      register: php_exe
      changed_when: false

    - name: Install Laravel as Windows service via NSSM
      win_shell: >
        nssm install LaravelAPI "{{ php_exe.stdout | trim }}"
        artisan serve --host=0.0.0.0 --port={{ laravel_port }}

    - name: Configure NSSM service parameters
      win_shell: |
        nssm set LaravelAPI AppDirectory "{{ laravel_app }}/repo"
        nssm set LaravelAPI AppStdout "{{ laravel_logs }}/stdout.log"
        nssm set LaravelAPI AppStderr "{{ laravel_logs }}/stderr.log"
        nssm set LaravelAPI AppStdoutCreationDisposition 4
        nssm set LaravelAPI AppStderrCreationDisposition 4
        nssm set LaravelAPI AppRotateFiles 1
        nssm set LaravelAPI AppRotateBytes 10485760
      changed_when: false

    - name: Start Laravel API service
      win_service:
        name: LaravelAPI
        start_mode: auto
        state: started

    - name: Wait for Laravel to start responding
      win_uri:
        url: "http://localhost:{{ laravel_port }}/"
        return_content: false
        status_code: [200, 302]
      register: laravel_check
      retries: 12
      delay: 10
      until: laravel_check.status_code is defined and laravel_check.status_code in [200, 302]
      ignore_errors: true

    - name: Show Laravel startup status
      debug:
        msg: "Laravel is {{ 'running' if laravel_check is succeeded else 'NOT responding — check logs at ' + laravel_logs }}"

    # ---------------------------------------------------------------
    # IIS reverse proxy to Laravel (same as 3-tier frontend)
    # ---------------------------------------------------------------
    - name: Create frontend web directory
      win_file:
        path: C:\inetpub\LaravelFrontend
        state: directory

    - name: Create web.config with reverse proxy to Laravel
      win_copy:
        dest: C:\inetpub\LaravelFrontend\web.config
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration>
            <system.webServer>
              <httpErrors existingResponse="PassThrough" />
              <rewrite>
                <rules>
                  <rule name="ReverseProxy to Laravel App" stopProcessing="true">
                    <match url="(.*)" />
                    <action type="Rewrite" url="http://127.0.0.1:{{ laravel_port }}/{R:1}" />
                  </rule>
                </rules>
              </rewrite>
            </system.webServer>
          </configuration>

    - name: Remove default IIS website
      win_iis_website:
        name: "Default Web Site"
        state: absent

    - name: Create IIS application pool (No Managed Code)
      win_iis_webapppool:
        name: LaravelFrontendPool
        state: started
        attributes:
          managedRuntimeVersion: ''

    - name: Create IIS website
      win_iis_website:
        name: LaravelFrontend
        state: started
        port: 80
        physical_path: C:\inetpub\LaravelFrontend
        application_pool: LaravelFrontendPool

    - name: Reset IIS to apply ARR and rewrite changes
      win_shell: iisreset /restart
      changed_when: false

    # ---------------------------------------------------------------
    # Firewall
    # ---------------------------------------------------------------
    - name: Allow HTTP (port 80) through Windows Firewall
      win_firewall_rule:
        name: "HTTP Inbound"
        localport: 80
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Allow Laravel port through Windows Firewall
      win_firewall_rule:
        name: "Laravel HTTP"
        localport: "{{ laravel_port }}"
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Allow MySQL (port 3306) through Windows Firewall
      win_firewall_rule:
        name: "MySQL Inbound"
        localport: 3306
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    # ---------------------------------------------------------------
    # WinRM + RDP — keep available for Azure Migrate
    # ---------------------------------------------------------------
    - name: Ensure WinRM service is running
      win_service:
        name: WinRM
        start_mode: auto
        state: started

    - name: Enable RDP
      win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    - name: Allow RDP through firewall
      win_firewall_rule:
        name: "Remote Desktop"
        localport: 3389
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true
