---
# =============================================================================
# Windows LAMP VM — WordPress on IIS + MySQL
# Installs IIS with PHP (CGI), MySQL, and deploys WordPress
# Requires WinRM configured in the Windows template
# =============================================================================
- name: Deploy WordPress + MySQL on Windows
  hosts: win_php_servers
  gather_facts: true
  become: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    # ---------------------------------------------------------------
    # WinRM memory limit
    # ---------------------------------------------------------------
    - name: Increase WinRM shell memory to 1GB
      win_shell: |
        Set-Item WSMan:\localhost\Shell\MaxMemoryPerShellMB 1024
        Set-Item WSMan:\localhost\Plugin\microsoft.powershell\Quotas\MaxMemoryPerShellMB 1024
      changed_when: false
      ignore_errors: true

    # ---------------------------------------------------------------
    # Chocolatey (package manager)
    # ---------------------------------------------------------------
    - name: Install Chocolatey
      win_shell: |
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        }
      args:
        creates: C:\ProgramData\chocolatey\bin\choco.exe

    # ---------------------------------------------------------------
    # IIS with CGI (for PHP)
    # ---------------------------------------------------------------
    - name: Install IIS with CGI support
      win_feature:
        name:
          - Web-Server
          - Web-CGI
          - Web-ISAPI-Ext
          - Web-ISAPI-Filter
          - Web-Mgmt-Console
          - Web-Mgmt-Tools
        state: present
      register: iis_install

    - name: Reboot if IIS install requires it
      win_reboot:
      when: iis_install.reboot_required | default(false)

    # ---------------------------------------------------------------
    # PHP
    # ---------------------------------------------------------------
    - name: Install PHP via Chocolatey
      win_chocolatey:
        name: php
        state: present
        package_params: "/InstallDir:C:\\PHP"

    - name: Detect PHP install path
      win_shell: |
        $phpExe = (Get-Command php -ErrorAction SilentlyContinue).Source
        if ($phpExe) {
          Write-Output (Split-Path $phpExe)
        } elseif (Test-Path "C:\PHP\php.exe") {
          Write-Output "C:\PHP"
        } else {
          $found = Get-ChildItem "C:\tools" -Directory -Filter "php*" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          Write-Output $found
        }
      register: php_detect
      changed_when: false

    - name: Set PHP path fact
      set_fact:
        php_path: "{{ php_detect.stdout | trim }}"

    - name: Add PHP to PATH
      win_path:
        elements:
          - '{{ php_path }}'
        state: present

    - name: Create php.ini from development template if missing
      win_shell: |
        if (!(Test-Path "{{ php_path }}\php.ini")) {
          if (Test-Path "{{ php_path }}\php.ini-development") {
            Copy-Item "{{ php_path }}\php.ini-development" "{{ php_path }}\php.ini"
          } elseif (Test-Path "{{ php_path }}\php.ini-production") {
            Copy-Item "{{ php_path }}\php.ini-production" "{{ php_path }}\php.ini"
          }
        }
      args:
        creates: '{{ php_path }}\php.ini'

    - name: Enable required PHP extensions
      win_lineinfile:
        path: '{{ php_path }}\php.ini'
        regexp: "^;?extension={{ item }}"
        line: "extension={{ item }}"
      loop:
        - curl
        - fileinfo
        - mbstring
        - openssl
        - pdo_mysql
        - mysqli
        - gd

    - name: Set PHP cgi.fix_pathinfo
      win_lineinfile:
        path: '{{ php_path }}\php.ini'
        regexp: "^;?cgi\\.fix_pathinfo"
        line: "cgi.fix_pathinfo=0"

    # ---------------------------------------------------------------
    # Configure IIS FastCGI for PHP
    # ---------------------------------------------------------------
    - name: Configure FastCGI handler for PHP
      win_shell: |
        Import-Module WebAdministration
        $handler = Get-WebHandler -Name "PHP_via_FastCGI" -ErrorAction SilentlyContinue
        if (!$handler) {
          New-WebHandler -Name "PHP_via_FastCGI" -Path "*.php" -Verb "*" -Modules "FastCgiModule" -ScriptProcessor "{{ php_path }}\php-cgi.exe" -ResourceType File
        }
        $existing = Get-WebConfiguration "/system.webServer/fastCgi/application[@fullPath='{{ php_path }}\php-cgi.exe']" -ErrorAction SilentlyContinue
        if (!$existing) {
          Add-WebConfiguration "/system.webServer/fastCgi" -Value @{fullPath='{{ php_path }}\php-cgi.exe'}
        }
      changed_when: false

    # ---------------------------------------------------------------
    # MySQL
    # ---------------------------------------------------------------
    - name: Install MySQL via Chocolatey
      win_chocolatey:
        name: mysql
        state: present

    - name: Ensure MySQL service is running
      win_service:
        name: MySQL
        start_mode: auto
        state: started

    - name: Wait for MySQL to be ready
      win_wait_for:
        port: 3306
        timeout: 60

    - name: Set MySQL root password and create WordPress database
      win_shell: |
        $mysqlBin = (Get-Command mysql -ErrorAction SilentlyContinue).Source
        if (!$mysqlBin) { $mysqlBin = "C:\tools\mysql\current\bin\mysql.exe" }
        & $mysqlBin -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}';" 2>$null
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "CREATE DATABASE IF NOT EXISTS {{ wp_db_name }};"
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "CREATE USER IF NOT EXISTS '{{ wp_db_user }}'@'localhost' IDENTIFIED BY '{{ wp_db_password }}';"
        & $mysqlBin -u root -p"{{ mysql_root_password }}" -e "GRANT ALL PRIVILEGES ON {{ wp_db_name }}.* TO '{{ wp_db_user }}'@'localhost'; FLUSH PRIVILEGES;"
      changed_when: false

    # ---------------------------------------------------------------
    # Deploy WordPress
    # ---------------------------------------------------------------
    - name: Download WordPress
      win_get_url:
        url: "https://wordpress.org/wordpress-{{ wp_version }}.zip"
        dest: C:\temp\wordpress.zip
        force: false

    - name: Create temp directory
      win_file:
        path: C:\temp
        state: directory

    - name: Extract WordPress
      win_unzip:
        src: C:\temp\wordpress.zip
        dest: C:\inetpub\
        creates: C:\inetpub\wordpress\wp-settings.php

    - name: Create wp-config.php
      win_copy:
        dest: C:\inetpub\wordpress\wp-config.php
        content: |
          <?php
          define('DB_NAME',     '{{ wp_db_name }}');
          define('DB_USER',     '{{ wp_db_user }}');
          define('DB_PASSWORD', '{{ wp_db_password }}');
          define('DB_HOST',     '127.0.0.1');
          define('DB_CHARSET',  'utf8mb4');
          define('DB_COLLATE',  '');
          $table_prefix = 'wp_';
          define('AUTH_KEY',         '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('SECURE_AUTH_KEY',  '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('LOGGED_IN_KEY',    '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('NONCE_KEY',        '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('AUTH_SALT',        '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('SECURE_AUTH_SALT', '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('LOGGED_IN_SALT',   '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('NONCE_SALT',       '{{ lookup("password", "/dev/null chars=ascii_letters,digits length=64") }}');
          define('WP_DEBUG', false);
          if ( ! defined('ABSPATH') ) { define('ABSPATH', __DIR__ . '/'); }
          require_once ABSPATH . 'wp-settings.php';

    - name: Download WP-CLI
      win_get_url:
        url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        dest: C:\tools\wp-cli.phar
        force: false

    - name: Run WordPress CLI install
      win_shell: |
        Set-Location C:\inetpub\wordpress
        php C:\tools\wp-cli.phar core install `
          --url="http://{{ ansible_host }}" `
          --title="{{ wp_site_title }}" `
          --admin_user="{{ wp_admin_user }}" `
          --admin_password="{{ wp_admin_password }}" `
          --admin_email="{{ wp_admin_email }}" `
          --path=C:\inetpub\wordpress `
          --skip-email
      changed_when: false

    - name: Set permissions on WordPress directory
      win_shell: |
        icacls "C:\inetpub\wordpress" /grant "IIS_IUSRS:(OI)(CI)F" /T
        icacls "C:\inetpub\wordpress\wp-content" /grant "IIS_IUSRS:(OI)(CI)F" /T
      changed_when: false

    # ---------------------------------------------------------------
    # Configure IIS site for WordPress
    # ---------------------------------------------------------------
    - name: Create web.config for WordPress URL rewriting
      win_copy:
        dest: C:\inetpub\wordpress\web.config
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration>
            <system.webServer>
              <rewrite>
                <rules>
                  <rule name="WordPress" stopProcessing="true">
                    <match url="^" ignoreCase="false" />
                    <conditions logicalGrouping="MatchAll">
                      <add input="{REQUEST_FILENAME}" matchType="IsDirectory" negate="true" />
                      <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="true" />
                    </conditions>
                    <action type="Rewrite" url="index.php" appendQueryString="true" />
                  </rule>
                </rules>
              </rewrite>
              <defaultDocument>
                <files>
                  <add value="index.php" />
                </files>
              </defaultDocument>
            </system.webServer>
          </configuration>

    - name: Install IIS URL Rewrite module
      win_chocolatey:
        name: urlrewrite
        state: present

    - name: Remove default IIS website
      win_iis_website:
        name: "Default Web Site"
        state: absent

    - name: Create IIS application pool for WordPress
      win_iis_webapppool:
        name: WordPressPool
        state: started

    - name: Create IIS website for WordPress
      win_iis_website:
        name: WordPressApp
        state: started
        port: 80
        physical_path: C:\inetpub\wordpress
        application_pool: WordPressPool

    # ---------------------------------------------------------------
    # Firewall
    # ---------------------------------------------------------------
    - name: Allow HTTP (port 80) through Windows Firewall
      win_firewall_rule:
        name: "HTTP Inbound"
        localport: 80
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    - name: Allow MySQL (port 3306) through Windows Firewall
      win_firewall_rule:
        name: "MySQL Inbound"
        localport: 3306
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true

    # ---------------------------------------------------------------
    # WinRM + RDP — keep available for Azure Migrate
    # ---------------------------------------------------------------
    - name: Ensure WinRM service is running
      win_service:
        name: WinRM
        start_mode: auto
        state: started

    - name: Enable RDP
      win_regedit:
        path: HKLM:\System\CurrentControlSet\Control\Terminal Server
        name: fDenyTSConnections
        data: 0
        type: dword

    - name: Allow RDP through firewall
      win_firewall_rule:
        name: "Remote Desktop"
        localport: 3389
        protocol: tcp
        direction: in
        action: allow
        state: present
        enabled: true
