---
# =============================================================================
# .NET VM — eShopOnWeb ASP.NET Core 8 + SQL Server 2022 Express on Ubuntu
# Same eShopOnWeb app as 3-tier, running on a single VM with local SQL Server
# =============================================================================
- name: Deploy eShopOnWeb + SQL Server (1-Tier)
  hosts: dotnet_servers
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    # ---- Passwordless sudo ----
    - name: Grant passwordless sudo to {{ ansible_user }}
      copy:
        content: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL\n"
        dest: "/etc/sudoers.d/{{ ansible_user }}"
        mode: '0440'
        validate: 'visudo -cf %s'

    # ---------------------------------------------------------------
    # System updates
    # ---------------------------------------------------------------
    - name: Clean apt cache and fix broken state
      shell: |
        apt-get clean
        rm -rf /var/lib/apt/lists/*
        apt-get update -y || true
        apt-get -f install -y || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install base packages
      apt:
        name: [git, curl, wget, gnupg2, software-properties-common, ca-certificates, nginx]
        state: present

    # ---------------------------------------------------------------
    # .NET SDK
    # ---------------------------------------------------------------
    - name: Add Microsoft package signing key
      shell: |
        wget -q https://packages.microsoft.com/config/ubuntu/{{ ansible_distribution_version }}/packages-microsoft-prod.deb -O /tmp/packages-microsoft-prod.deb
        dpkg -i /tmp/packages-microsoft-prod.deb
        rm -f /tmp/packages-microsoft-prod.deb
      args:
        creates: /etc/apt/sources.list.d/microsoft-prod.list

    - name: Remove conflicting dotnet packages
      apt:
        name: [dotnet-sdk-6.0, dotnet-sdk-8.0, dotnet-host, dotnet-hostfxr-6.0, dotnet-hostfxr-8.0]
        state: absent
      ignore_errors: true

    - name: Check if .NET 8.0 SDK is already installed
      shell: /usr/share/dotnet/dotnet --list-sdks 2>/dev/null | grep -q '^8\.' && echo yes || echo no
      register: dotnet8_installed
      changed_when: false
      failed_when: false

    - name: Install .NET SDK 8.0 via install script
      shell: |
        curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 8.0 --install-dir /usr/share/dotnet
        ln -sf /usr/share/dotnet/dotnet /usr/local/bin/dotnet
      when: dotnet8_installed.stdout != 'yes'

    # ---------------------------------------------------------------
    # SQL Server 2022 Express
    # ---------------------------------------------------------------
    - name: Import Microsoft GPG key for SQL Server repo
      shell: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/microsoft-archive-keyring.gpg

    - name: Add SQL Server APT repository
      copy:
        dest: /etc/apt/sources.list.d/mssql-server-2022.list
        content: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-archive-keyring.gpg] https://packages.microsoft.com/ubuntu/{{ ansible_distribution_version }}/mssql-server-2022 {{ ansible_distribution_release }} main\n"

    - name: Install SQL Server 2022
      apt:
        name: mssql-server
        state: present
        update_cache: true

    - name: Check if SQL Server is already configured
      shell: systemctl is-active mssql-server
      register: mssql_status
      ignore_errors: true
      changed_when: false

    - name: Stop SQL Server for reconfiguration
      systemd:
        name: mssql-server
        state: stopped
      when: mssql_status.rc != 0

    - name: Configure SQL Server Express edition
      shell: |
        MSSQL_SA_PASSWORD="{{ mssql_sa_password }}" \
        MSSQL_PID="{{ mssql_edition }}" \
        /opt/mssql/bin/mssql-conf -n setup accept-eula
      environment:
        ACCEPT_EULA: "Y"
      when: mssql_status.rc != 0

    - name: Ensure SQL Server is started
      systemd:
        name: mssql-server
        state: started
        enabled: true

    - name: Install SQL Server command-line tools
      apt:
        name:
          - mssql-tools18
          - unixodbc-dev
        state: present
        update_cache: true
      environment:
        ACCEPT_EULA: "Y"

    - name: Add sqlcmd to PATH
      lineinfile:
        path: /etc/environment
        regexp: '/opt/mssql-tools18/bin'
        line: 'PATH="/opt/mssql-tools18/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"'

    - name: Wait for SQL Server to be ready
      shell: /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "{{ mssql_sa_password }}" -C -Q "SELECT 1"
      register: sql_ready
      retries: 10
      delay: 5
      until: sql_ready.rc == 0
      changed_when: false

    - name: Create application database
      shell: |
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "{{ mssql_sa_password }}" -C -Q "
        IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = '{{ mssql_db_name }}')
        BEGIN CREATE DATABASE [{{ mssql_db_name }}] END"
      changed_when: false

    # ---------------------------------------------------------------
    # eShopOnWeb Application (same as 3-tier app server)
    # ---------------------------------------------------------------
    - name: Create app directory
      file:
        path: /opt/eshop
        state: directory
        owner: "{{ ansible_user }}"
        mode: "0755"

    - name: Set git safe.directory globally
      command: git config --global --add safe.directory '*'
      changed_when: false
      failed_when: false

    - name: Clone eShopOnWeb repository (archived .NET 8 version)
      git:
        repo: https://github.com/dotnet-architecture/eShopOnWeb.git
        dest: /opt/eshop/repo
        version: main
        force: true

    - name: Remove environment-specific appsettings overrides
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /opt/eshop/repo/src/Web/appsettings.Docker.json
        - /opt/eshop/repo/src/Web/appsettings.Development.json

    - name: Fix repo ownership
      file:
        path: /opt/eshop/repo
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    - name: Update Web project connection string for local SQL Server
      copy:
        dest: /opt/eshop/repo/src/Web/appsettings.json
        content: |
          {
            "baseUrls": {
              "apiBase": "http://0.0.0.0:{{ dotnet_app_port }}/api/",
              "webBase": "http://0.0.0.0:{{ dotnet_app_port }}/"
            },
            "ConnectionStrings": {
              "CatalogConnection": "Server=localhost;Database={{ mssql_db_name }};User Id=SA;Password={{ mssql_sa_password }};TrustServerCertificate=True;",
              "IdentityConnection": "Server=localhost;Database={{ mssql_db_name }};User Id=SA;Password={{ mssql_sa_password }};TrustServerCertificate=True;"
            },
            "CatalogBaseUrl": "",
            "Logging": {
              "LogLevel": {
                "Default": "Warning",
                "Microsoft": "Warning",
                "System": "Warning"
              }
            },
            "AllowedHosts": "*",
            "Kestrel": {
              "Endpoints": {
                "Http": {
                  "Url": "http://0.0.0.0:{{ dotnet_app_port }}"
                }
              }
            }
          }
        owner: "{{ ansible_user }}"

    - name: Clean stale published directory
      file:
        path: /opt/eshop/published
        state: absent

    - name: Build and publish eShopOnWeb Web project
      shell: |
        cd /opt/eshop/repo
        sudo -u {{ ansible_user }} dotnet publish src/Web/Web.csproj -c Release -o /opt/eshop/published
      args:
        executable: /bin/bash
      register: dotnet_build
      changed_when: dotnet_build.rc == 0
      notify: Restart eShop

    # ---------------------------------------------------------------
    # systemd service
    # ---------------------------------------------------------------
    - name: Stop and disable old dotnet-app service if present
      systemd:
        name: dotnet-app
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Remove old dotnet-app service file
      file:
        path: /etc/systemd/system/dotnet-app.service
        state: absent
      notify: Restart eShop

    - name: Remove old LegacyWebApp deployment
      file:
        path: /opt/dotnet-app
        state: absent

    - name: Create eShopOnWeb systemd service
      copy:
        dest: /etc/systemd/system/eshop-web.service
        content: |
          [Unit]
          Description=eShopOnWeb ASP.NET Core Application
          After=network.target mssql-server.service
          Requires=mssql-server.service

          [Service]
          Type=simple
          User={{ ansible_user }}
          WorkingDirectory=/opt/eshop/published
          ExecStart=/usr/local/bin/dotnet /opt/eshop/published/Web.dll
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          Environment=ASPNETCORE_ENVIRONMENT=Docker
          Environment=DOTNET_CLI_HOME=/tmp

          [Install]
          WantedBy=multi-user.target
      notify: Restart eShop

    - name: Enable and start eShopOnWeb service
      systemd:
        name: eshop-web
        daemon_reload: true
        enabled: true
        state: started

    # ---------------------------------------------------------------
    # Nginx reverse proxy
    # ---------------------------------------------------------------
    - name: Configure Nginx as reverse proxy for eShopOnWeb
      copy:
        dest: /etc/nginx/sites-available/dotnet-app
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass         http://127.0.0.1:{{ dotnet_app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection keep-alive;
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }
      notify: Restart Nginx

    - name: Enable the Nginx site
      file:
        src: /etc/nginx/sites-available/dotnet-app
        dest: /etc/nginx/sites-enabled/dotnet-app
        state: link
      notify: Restart Nginx

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Restart Nginx

    - name: Ensure Nginx is started and enabled
      systemd:
        name: nginx
        state: started
        enabled: true

    # ---------------------------------------------------------------
    # Firewall
    # ---------------------------------------------------------------
    - name: Allow HTTP through UFW
      ufw:
        rule: allow
        port: "80"
        proto: tcp
      ignore_errors: true

    - name: Allow SQL Server port through UFW
      ufw:
        rule: allow
        port: "1433"
        proto: tcp
      ignore_errors: true

  handlers:
    - name: Restart eShop
      systemd:
        name: eshop-web
        state: restarted

    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
