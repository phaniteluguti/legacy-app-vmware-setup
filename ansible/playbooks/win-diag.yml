---
# Quick diagnostic for Windows 1-tier Java + .NET VMs
- name: Diagnose Windows Java VM
  hosts: win_java_servers
  gather_facts: false
  become: false
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Check WAR contents for properties file
      win_shell: |
        Write-Output "=== WAR file ==="
        $war = Get-ChildItem "C:\Tomcat\webapps" -Filter "petclinic.war" -ErrorAction SilentlyContinue
        if ($war) { Write-Output "Found: $($war.FullName) ($([math]::Round($war.Length/1MB,2)) MB)" } else { Write-Output "NO WAR FOUND" }
        Write-Output ""
        Write-Output "=== Extracted webapp ==="
        if (Test-Path "C:\Tomcat\webapps\petclinic") { Write-Output "Extracted: YES" } else { Write-Output "Extracted: NO" }
        Write-Output ""
        Write-Output "=== application-postgresql.properties in WAR ==="
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        if ($war) {
          $zip = [System.IO.Compression.ZipFile]::OpenRead($war.FullName)
          $entry = $zip.Entries | Where-Object { $_.Name -eq "application-postgresql.properties" }
          if ($entry) {
            Write-Output "FOUND in WAR: $($entry.FullName)"
            $sr = New-Object System.IO.StreamReader($entry.Open())
            Write-Output $sr.ReadToEnd()
            $sr.Close()
          } else {
            Write-Output "MISSING FROM WAR!"
          }
          $zip.Dispose()
        }
        Write-Output ""
        Write-Output "=== Source properties file ==="
        $src = "C:\Apps\petclinic-rest\src\main\resources\application-postgresql.properties"
        if (Test-Path $src) { Get-Content $src } else { Write-Output "MISSING from source!" }
        Write-Output ""
        Write-Output "=== Spring logs (petclinic dir) ==="
        $springLog = Get-ChildItem "C:\Tomcat\webapps\petclinic" -Recurse -Filter "*.log" -ErrorAction SilentlyContinue | Select-Object -First 3
        if ($springLog) { $springLog | ForEach-Object { Write-Output "LOG: $($_.FullName)"; Get-Content $_.FullName -Tail 20 } } else { Write-Output "(no logs in webapp dir)" }
        Write-Output ""
        Write-Output "=== Tomcat localhost log ==="
        $llog = Get-ChildItem "C:\Tomcat\logs" -Filter "localhost*.log" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($llog) { Write-Output "File: $($llog.Name)"; Get-Content $llog.FullName -Tail 50 } else { Write-Output "(not found)" }
        Write-Output ""
        Write-Output "=== HTTP tests (15s timeout) ==="
        try { $r = Invoke-WebRequest -Uri "http://localhost:9966/petclinic/" -UseBasicParsing -TimeoutSec 15; Write-Output "/petclinic/ => Status: $($r.StatusCode)" } catch { Write-Output "/petclinic/ => FAIL: $_" }
        try { $r = Invoke-WebRequest -Uri "http://localhost:9966/petclinic/api/owners" -UseBasicParsing -TimeoutSec 15; Write-Output "/petclinic/api/owners => Status: $($r.StatusCode)" } catch { Write-Output "/petclinic/api/owners => FAIL: $_" }
        try { $r = Invoke-WebRequest -Uri "http://localhost:9966/" -UseBasicParsing -TimeoutSec 15; Write-Output "/ => Status: $($r.StatusCode)" } catch { Write-Output "/ => FAIL: $_" }
        Write-Output ""
        Write-Output "=== DB connectivity test ==="
        $env:PGPASSWORD = "{{ postgres_password }}"
        & "C:\Program Files\PostgreSQL\15\bin\psql.exe" -U {{ postgres_user }} -d {{ postgres_db }} -h localhost -tAc "SELECT count(*) FROM pg_tables WHERE schemaname='public'" 2>&1
      register: java_diag
      timeout: 120
    - debug: var=java_diag.stdout_lines

