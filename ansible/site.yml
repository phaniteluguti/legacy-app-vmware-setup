---
# =============================================================================
# Master Playbook — Deploys all legacy apps + prepares for Azure Migrate
# Usage: ansible-playbook -i inventory/hosts.ini site.yml
# =============================================================================

# --- Linux mode plays (skipped when no Linux hosts in inventory) ---
- name: Common setup for all Linux VMs
  hosts: legacy_apps
  become: true
  tasks:
    - name: Fix broken apt state if needed
      shell: |
        apt-get clean
        rm -rf /var/lib/apt/lists/*
        apt-get update -y
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: true

    - name: Update all packages
      apt:
        update_cache: true
        upgrade: safe
      ignore_errors: true

    - name: Set timezone
      timezone:
        name: UTC

    - name: Ensure SSH is running
      systemd:
        name: ssh
        state: started
        enabled: true

# Deploy each application stack (Linux)
- import_playbook: playbooks/java-petclinic.yml
- import_playbook: playbooks/dotnet-app.yml
- import_playbook: playbooks/php-app.yml

# Deploy each application stack (Windows)
- import_playbook: playbooks/win-java-petclinic.yml
- import_playbook: playbooks/win-iis-app.yml
- import_playbook: playbooks/win-php-app.yml

# Prepare all VMs for Azure Migrate assessment
- import_playbook: playbooks/azure-migrate-prep.yml
