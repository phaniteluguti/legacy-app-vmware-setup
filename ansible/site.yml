---
# =============================================================================
# Master Playbook — Deploys all legacy apps + prepares for Azure Migrate
# Usage: ansible-playbook -i inventory/hosts.ini site.yml
# =============================================================================

# --- Linux mode plays (skipped when no Linux hosts in inventory) ---
- name: Common setup for all Linux VMs
  hosts: legacy_apps
  become: true
  tasks:
    - name: Fix broken apt state if needed
      shell: |
        apt-get clean
        rm -rf /var/lib/apt/lists/*
        apt-get update -y
      args:
        executable: /bin/bash
      changed_when: false
      ignore_errors: true

    - name: Update all packages
      apt:
        update_cache: true
        upgrade: safe
      ignore_errors: true

    - name: Set timezone
      timezone:
        name: UTC

    - name: Ensure SSH is running
      systemd:
        name: ssh
        state: started
        enabled: true

# Deploy each application stack (Linux single-VM)
- import_playbook: playbooks/java-petclinic.yml
- import_playbook: playbooks/dotnet-app.yml
- import_playbook: playbooks/php-app.yml

# --- Wait for WinRM on all Windows VMs (single-VM + 3-tier) ---
- name: Wait for WinRM connectivity on Windows VMs
  hosts: win_servers,win_servers_3tier
  gather_facts: false
  become: false
  tasks:
    - name: Wait for WinRM port 5985 to be reachable
      delegate_to: localhost
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: 5985
        timeout: 300
        delay: 10
        state: started

    - name: Wait for WinRM connection to succeed
      wait_for_connection:
        timeout: 300
        delay: 5
        sleep: 10

# Deploy each application stack (Windows single-VM)
- import_playbook: playbooks/win-java-petclinic.yml
- import_playbook: playbooks/win-iis-app.yml
- import_playbook: playbooks/win-php-app.yml

# Deploy 3-tier stacks (Linux)
- import_playbook: playbooks/3tier/site-3tier.yml
# Deploy 3-tier stacks (Windows)
- import_playbook: playbooks/3tier/site-3tier-win.yml

# Prepare all VMs for Azure Migrate assessment
- import_playbook: playbooks/azure-migrate-prep.yml
